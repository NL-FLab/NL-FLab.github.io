<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <title>NL F.Lab | Portfolio Details</title>

    <style>
        :root {
            --bg: #0c0c0c;
            --text-main: #e5e5e5;
            --text-dim: #888;
            --accent: #555;
        }

        body{margin:0;background:var(--bg);color:var(--text-main);font-family:'Inter',sans-serif;overflow-x:hidden;line-height:1.6;-webkit-font-smoothing:antialiased;}
        body.lock-scroll{overflow:hidden!important;}

        /* Container Fade-in lúc vào trang */
        .container {
            max-width:1100px;
            margin:0 auto;
            padding:0 10% 80px 10%;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .container.page-loaded {
            opacity: 1;
            transform: translateY(0);
        }
        
        .back{padding:40px 10% 10px 10%;max-width:1100px;margin:0 auto;}
        .back a{font-size:10px;color:var(--accent);text-decoration:none;text-transform:uppercase;letter-spacing:2px;transition:.3s;}
        .back a:hover{color:#fff;}

        h1{font-weight:300;font-size:clamp(26px,4vw,36px);margin:0 0 48px 0;color:#fff;letter-spacing:-0.5px;}

        /* TOP SECTION - Grid 1:1.2 cân đối */
        .top-section{
            display:grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 64px;
            margin-bottom: 96px;
            align-items: start;
        }

        .info-block { margin-bottom: 40px; }
        .info-block:last-child { margin-bottom: 0; }
        .info-block strong {
            color: #fff;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 16px;
        }

        #description { color: var(--text-dim); font-size: 14px; line-height: 1.8; margin: 0; text-align: justify; }

        .tech-list{list-style:none;padding:0;margin:0;}
        .tech-list li{
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tech-list li span{color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-size: 10px;}
        .tech-list li b{font-weight: 400; color: #ccc;}

        .viewer iframe{
            width:100%;
            aspect-ratio:16/9;
            border:none;
            border-radius:12px;
            background:#111;
            box-shadow:0 30px 60px rgba(0,0,0,.4);
        }

        /* Hero & Gallery 1:1 */
        .hero-section{margin-bottom:64px;display:flex;justify-content:center;width:100%;}
        .hero-section .img-reveal-container{width:100%; max-width:700px; display:none;}

        .image-section{display:grid;grid-template-columns:1fr 1fr;gap:40px;}

        .img-wrapper{
            position:relative;
            border-radius:15px;
            cursor:zoom-in;
            background:#111;
            overflow:hidden;
            transition:transform 0.5s cubic-bezier(.16,1,.3,1);
            aspect-ratio: 1/1;
        }
        
        .img-wrapper img{
            width:100%; height:100%;
            object-fit:cover;
            border-radius:15px;
            display:block;
            opacity:0;
            will-change: opacity;
            transition:opacity .8s ease;
        }
        .img-wrapper img.loaded{opacity:1;}
        .img-wrapper:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,255,255,.1);}

        .img-caption{
            position:absolute;bottom:20px;left:20px;font-size:9px;color:#fff;
            text-transform:uppercase;letter-spacing:2px;
            background:rgba(0,0,0,.6);backdrop-filter:blur(10px);
            padding:6px 14px;border-radius:2px;
            opacity:0;transform:translateY(10px);transition:.4s;
            pointer-events:none;
        }
        .img-wrapper:hover .img-caption{opacity:1;transform:translateY(0);}

        /* Hiệu ứng trượt hiện hình khi cuộn trang */
        .img-reveal-container {
            opacity:0;
            transform:translateY(30px);
            transition: opacity 1s cubic-bezier(0.2, 0, 0.2, 1), transform 1s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .img-reveal-container.reveal {
            opacity:1;
            transform:translateY(0);
        }

        /* Lightbox GPU Style */
        #lightbox{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:9999;pointer-events:none;transition:background .5s cubic-bezier(0.2, 0, 0, 1.0);}
        #lightbox.active{background:rgba(0,0,0,.96);pointer-events:auto;backdrop-filter: blur(12px);}

        #zoom-img{
            position:fixed;top:0;left:0;z-index:10000;
            object-fit:cover;
            border-radius:15px;
            display:none;
            pointer-events:none;
            will-change: transform;
            transform-origin: top left;
        }

        @media(max-width:850px){
            .container{padding:0 6% 60px 6%;}
            .top-section{grid-template-columns:1fr; gap:48px;}
            .image-section{grid-template-columns:1fr;}
            .hero-section .img-reveal-container{max-width:100%;}
        }
    </style>
</head>

<body>

<div class="back"><a href="index.html">← Back to Portfolio</a></div>

<div class="container" id="mainContainer">
    <h1 id="title">Loading...</h1>
    
    <div class="top-section">
        <div class="info">
            <div class="info-block">
                <strong>Project Insight</strong>
                <div id="description"></div>
            </div>
            
            <div class="info-block">
                <strong>Technical Specs</strong>
                <ul class="tech-list" id="techDetails"></ul>
            </div>
        </div>

        <div class="viewer" id="viewerBlock">
            <iframe id="viewer" loading="lazy"></iframe>
        </div>
    </div>

    <div class="hero-section">
        <div class="img-reveal-container" id="heroReveal">
            <div class="img-wrapper" id="heroWrapper">
                <img id="hero">
                <div class="img-caption" id="heroCaption"></div>
            </div>
        </div>
    </div>

    <div class="image-section" id="gallery"></div>
</div>

<div id="lightbox"><img id="zoom-img"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const projectSlug = params.get("project");

    function formatCaption(n){
        return n.split('/').pop().split('.').slice(0,-1).join('.').replace(/_/g,' ').toUpperCase();
    }

    // REVEAL & LAZY LOAD OBSERVER (Đón đầu 500px)
    const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if(e.isIntersecting){
                const container = e.target;
                const img = container.querySelector('img');
                
                if(img && img.dataset.src) {
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add("loaded");
                }
                
                container.classList.add("reveal");
                revealObserver.unobserve(container);
            }
        });
    }, { 
        rootMargin: "0px 0px 500px 0px", 
        threshold: 0.01 
    });

    async function loadProduct(){
        if(!projectSlug) return;
        try {
            const res = await fetch(`models/${projectSlug}/info.json`);
            const data = await res.json();
            
            // Cập nhật nội dung chữ
            document.getElementById("title").innerText = data.info.title;
            document.getElementById("description").innerText = data.info.description;
            
            const tech = data.technical;
            document.getElementById("techDetails").innerHTML = `
                <li><span>Dimensions</span><b>${tech.scale} ${tech.unit}</b></li>
                <li><span>Geometry</span><b>${tech.polycount.pair} TRIS</b></li>
                <li><span>Materials</span><b>PBR WORKFLOW</b></li>
                <li><span>Pipeline</span><b>${tech.software[0]} / ${tech.render_engine}</b></li>
            `;

            // Hiện trang sau khi text đã sẵn sàng
            document.getElementById("mainContainer").classList.add("page-loaded");

            // Hero Image
            const heroEl = document.getElementById("hero");
            heroEl.src = `models/${projectSlug}/${data.media.hero}`;
            heroEl.onload = () => heroEl.classList.add("loaded");
            document.getElementById("heroCaption").innerText = formatCaption(data.media.hero);
            document.getElementById("heroReveal").style.display = "block";
            document.getElementById("heroWrapper").onclick = () => openSmoothZoom(heroEl);
            revealObserver.observe(document.getElementById("heroReveal"));

            // Gallery Images (Lazy load đón đầu)
            const configRes = await fetch("models/gallery_config.json");
            const config = await configRes.json();
            const gallery = document.getElementById("gallery");

            config.order.forEach(name => {
                const imgUrl = `models/${projectSlug}/images/${name}`;
                const revealContainer = document.createElement("div");
                revealContainer.className = "img-reveal-container";
                revealContainer.innerHTML = `
                    <div class="img-wrapper">
                        <img decoding="async" data-src="${imgUrl}">
                        <div class="img-caption">${formatCaption(name)}</div>
                    </div>
                `;
                gallery.appendChild(revealContainer);
                
                revealContainer.querySelector('.img-wrapper').onclick = function() {
                    const actualImg = this.querySelector('img');
                    if(actualImg.classList.contains('loaded')) openSmoothZoom(actualImg);
                };

                revealObserver.observe(revealContainer);
            });

            // Viewer
            if(data.viewer?.enabled) {
                document.getElementById("viewer").src = `viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;
            } else {
                document.getElementById("viewerBlock").style.display = "none";
            }

        } catch(err) { console.error("Lỗi:", err); }
    }

    // ZOOM ENGINE
    const lightbox = document.getElementById("lightbox");
    const zoomImg = document.getElementById("zoom-img");
    let activeOriginImg = null;
    let animating = false;

    function openSmoothZoom(originImg){
        if(animating) return;
        animating = true;
        activeOriginImg = originImg;

        const sw = window.innerWidth - document.documentElement.clientWidth;
        document.body.style.paddingRight = sw + "px";
        document.body.classList.add("lock-scroll");

        const rect = originImg.getBoundingClientRect();
        zoomImg.src = originImg.src;
        zoomImg.style.display = "block";
        zoomImg.style.width = rect.width + "px";
        zoomImg.style.height = rect.height + "px";
        zoomImg.style.transition = "none";
        zoomImg.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1)`;
        
        zoomImg.offsetHeight;

        const winW = window.innerWidth - sw;
        const winH = window.innerHeight;
        const imgAspect = originImg.naturalWidth / originImg.naturalHeight;
        const winAspect = winW / winH;

        let targetW, targetH;
        if (imgAspect > winAspect) {
            targetW = winW * 0.92;
            targetH = targetW / imgAspect;
        } else {
            targetH = winH * 0.92;
            targetW = targetH * imgAspect;
        }

        const scaleX = targetW / rect.width;
        const scaleY = targetH / rect.height;
        const moveX = ((winW - targetW) / 2) - rect.left;
        const moveY = ((winH - targetH) / 2) - rect.top;

        lightbox.classList.add("active");
        originImg.style.visibility = "hidden";

        requestAnimationFrame(() => {
            zoomImg.style.transition = "transform 0.5s cubic-bezier(0.2, 0, 0, 1.0)";
            zoomImg.style.transform = `translate3d(${rect.left + moveX}px, ${rect.top + moveY}px, 0) scale(${scaleX}, ${scaleY})`;
            setTimeout(() => { zoomImg.style.objectFit = "contain"; }, 50);
        });
        setTimeout(() => { animating = false; }, 500);
    }

    function closeSmoothZoom(){
        if(!activeOriginImg || animating) return;
        animating = true;
        const rect = activeOriginImg.getBoundingClientRect();
        zoomImg.style.objectFit = "cover";
        zoomImg.style.transition = "transform 0.45s cubic-bezier(0.2, 0, 0, 1.0)";
        zoomImg.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1)`;
        lightbox.classList.remove("active");
        setTimeout(() => {
            activeOriginImg.style.visibility = "visible";
            zoomImg.style.display = "none";
            document.body.classList.remove("lock-scroll");
            document.body.style.paddingRight = "0px";
            activeOriginImg = null;
            animating = false;
        }, 450);
    }

    window.addEventListener("resize", () => { if(activeOriginImg) closeSmoothZoom(); });
    lightbox.onclick = closeSmoothZoom;
    window.addEventListener("keydown", e => { if(e.key === "Escape") closeSmoothZoom(); });

    loadProduct();
</script>

</body>
</html>
