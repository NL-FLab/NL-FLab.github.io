<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<title>NL F.Lab | Portfolio Details</title>

<style>

body{
margin:0;
background:#0c0c0c;
color:#e5e5e5;
font-family:'Inter',sans-serif;
line-height:1.6;
}

/* layout */

.container{
max-width:1200px;
margin:auto;
padding:0 10% 80px;
}

.back{
padding:40px 10% 20px;
}

.back a{
font-size:10px;
color:#555;
text-decoration:none;
letter-spacing:2px;
text-transform:uppercase;
}

h1{
font-weight:300;
font-size:clamp(26px,4vw,36px);
margin:10px 0 40px;
}

/* top section */

.top-section{
display:grid;
grid-template-columns:1fr 1fr;
gap:80px;
align-items:center;
margin-bottom:80px;
}

.info{
color:#888;
font-size:14px;
}

.info strong{
display:block;
font-size:11px;
letter-spacing:2px;
margin-bottom:12px;
color:#fff;
}

.tech-list{
list-style:none;
padding:0;
margin:0;
}

.tech-list li{
display:flex;
justify-content:space-between;
font-size:12px;
padding:8px 0;
border-bottom:1px solid #1a1a1a;
}

.viewer iframe{
width:100%;
aspect-ratio:1/1;
border:none;
border-radius:24px;
background:#111;
}

/* hero */

.hero-section{
display:flex;
justify-content:center;
margin-bottom:60px;
}

.hero-section .img-wrapper{
width:55%;
}

/* image */

.img-wrapper{
position:relative;
overflow:hidden;
border-radius:16px;
cursor:pointer;
background:#111;
}

.img-wrapper img{
width:100%;
display:block;
transition:transform .4s ease;
}

.img-wrapper:hover img{
transform:scale(1.04);
}

/* caption */

.img-caption{
position:absolute;
bottom:16px;
left:16px;
font-size:10px;
letter-spacing:2px;
color:#fff;
background:rgba(0,0,0,.6);
padding:6px 12px;
border-radius:20px;
opacity:0;
transition:.3s;
}

.img-wrapper:hover .img-caption{
opacity:1;
}

/* gallery */

.image-section{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:36px;
}

/* responsive */

@media(max-width:1100px){

.image-section{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:850px){

.top-section{
grid-template-columns:1fr;
}

.image-section{
grid-template-columns:1fr;
}

.hero-section .img-wrapper{
width:100%;
}

}

/* lightbox */

#lightbox{

position:fixed;
inset:0;

background:rgba(0,0,0,.94);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;

transition:opacity .25s ease;

z-index:9999;

}

#lightbox.active{
opacity:1;
pointer-events:auto;
}

#lightbox img{

max-width:92vw;
max-height:92vh;

transform:scale(.96);

transition:transform .28s ease;

border-radius:12px;

}

#lightbox.active img{
transform:scale(1);
}

</style>
</head>

<body>

<div class="back">
<a href="index.html">← Back to Portfolio</a>
</div>

<div class="container">

<h1 id="title">Loading...</h1>

<div class="top-section">

<div class="info">

<strong>Project Insight</strong>

<div id="description"></div>

<strong>Technical Specs</strong>

<ul class="tech-list" id="techDetails"></ul>

</div>

<div class="viewer" id="viewerBlock">
<iframe id="viewer"></iframe>
</div>

</div>

<div class="hero-section">

<div class="img-wrapper" id="heroWrapper">

<img id="hero">

<div class="img-caption" id="heroCaption"></div>

</div>

</div>

<div class="image-section" id="gallery"></div>

</div>

<div id="lightbox">
<img id="lightbox-img">
</div>

<script>

const params=new URLSearchParams(window.location.search)

const projectSlug=params.get("project")

function formatCaption(fileName){

let base=fileName.split('/').pop()

let name=base.split('.').slice(0,-1).join('.')

return name.replace(/_/g,' ').toUpperCase()

}

/* load product */

async function loadProduct(){

if(!projectSlug)return

try{

const res=await fetch(`models/${projectSlug}/info.json`)

const data=await res.json()

title.innerText=data.info.title

description.innerText=data.info.description

const tech=data.technical

techDetails.innerHTML=`

<li><span>Dimensions</span><b>${tech.scale} ${tech.unit}</b></li>

<li><span>Geometry</span><b>${tech.polycount.pair} TRIS</b></li>

<li><span>Materials</span><b>PBR WORKFLOW</b></li>

<li><span>Pipeline</span><b>${tech.software[0]} / ${tech.render_engine}</b></li>

`

/* hero */

hero.src=`models/${projectSlug}/${data.media.hero}`

heroCaption.innerText=formatCaption(data.media.hero)

heroWrapper.onclick=()=>openZoom(hero)

hero.onerror=()=>{

document.querySelector(".hero-section").style.display="none"

}

/* gallery */

const configRes=await fetch("models/gallery_config.json")

const config=await configRes.json()

config.order.forEach(name=>{

const wrapper=document.createElement("div")

wrapper.className="img-wrapper"

const img=document.createElement("img")

img.src=`models/${projectSlug}/images/${name}`

img.onerror=()=>wrapper.remove()

const cap=document.createElement("div")

cap.className="img-caption"

cap.innerText=formatCaption(name)

wrapper.append(img,cap)

wrapper.onclick=()=>openZoom(img)

gallery.append(wrapper)

})

if(data.viewer?.enabled){

viewer.src=`viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`

}else{

viewerBlock.style.display="none"

}

}catch(e){

console.error(e)

}

}

/* zoom simple */

const lightbox=document.getElementById("lightbox")

const lightboxImg=document.getElementById("lightbox-img")

function openZoom(img){

lightboxImg.src=img.src

lightbox.classList.add("active")

}

function closeZoom(){

lightbox.classList.remove("active")

}

lightbox.onclick=closeZoom

window.addEventListener("keydown",e=>{
if(e.key==="Escape")closeZoom()
})

loadProduct()

</script>

</body>
</html>
