<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <title>NL F.Lab | Portfolio Details</title>
    <style>
        :root {
            --bg: #0c0c0c;
            --text-main: #e5e5e5;
            --text-dim: #888;
            --apple-bezier: cubic-bezier(0.28, 0.84, 0.42, 1);
            --radius: 15px;
        }

        body { margin:0; background:var(--bg); color:var(--text-main); font-family:'Inter',sans-serif; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
        body.lock-scroll { overflow:hidden!important; }
        
        .container { max-width:1100px; margin:0 auto; padding:0 8% 80px 8%; }
        .back { padding:40px 8% 20px 8%; max-width:1100px; margin:0 auto; }
        .back a { font-size:10px; color:#555; text-decoration:none; text-transform:uppercase; letter-spacing:2px; transition:.3s; }
        .back a:hover { color:#fff; }
        
        h1 { font-weight:300; font-size:clamp(26px,4vw,36px); margin:10px 0 40px 0; color:#fff; letter-spacing:-0.5px; }

        .top-section { display:grid; grid-template-columns:1fr 1fr; gap:60px; margin-bottom:80px; align-items:start; }
        .info strong { color:#fff; display:block; margin-bottom:12px; font-size:11px; text-transform:uppercase; letter-spacing:2px; border-left: 2px solid #333; padding-left: 12px; }
        #description { margin-bottom:30px; color: var(--text-dim); font-size: 14px; text-align: justify; line-height: 1.8; }
        .tech-list { list-style:none; padding:0; margin:0; }
        .tech-list li { padding:10px 0; border-bottom:1px solid #1a1a1a; font-size:12px; display:flex; justify-content:space-between; }
        .tech-list li span { color:#444; text-transform:uppercase; font-size:10px; }
        .tech-list li b { color:#aaa; font-weight:400; }
        .viewer iframe { width:100%; aspect-ratio:16/9; border:none; border-radius:var(--radius); background:#111; }

        /* Hero */
        .hero-section { margin-bottom:60px; width:100%; display: flex; justify-content: center; min-height: 100px; }
        #heroReveal { width:100%; display:none; opacity:0; transform:translateY(30px); transition: opacity .8s ease, transform .8s var(--apple-bezier); }
        #heroReveal.reveal { display:block; opacity:1; transform:translateY(0); }
        #hero { width:100%; height:auto; border-radius:var(--radius); object-fit: cover; cursor: zoom-in; display: block; }

        /* Gallery 3 Columns */
        .image-section { display:grid; grid-template-columns: repeat(3, 1fr); gap:30px; }
        .img-reveal-container { opacity:0; transform:translateY(30px); transition: opacity .8s ease, transform .8s var(--apple-bezier); }
        .img-reveal-container.reveal { opacity:1; transform:translateY(0); }

        .img-wrapper { position:relative; border-radius:var(--radius); overflow:hidden; cursor:zoom-in; background:#111; transition: transform 0.5s var(--apple-bezier); }
        .img-wrapper:hover { transform: translateY(-8px); }
        .img-wrapper img { width:100%; display: block; border-radius:var(--radius); transition: opacity 0.5s ease; }

        .img-caption {
            position:absolute; bottom:20px; left:20px; font-size:9px; color:#fff;
            text-transform:uppercase; letter-spacing:2px; background:rgba(0,0,0,0.6);
            backdrop-filter:blur(10px); padding:6px 14px; border-radius:2px; opacity:0; transform:translateY(10px); transition: .4s ease;
        }
        .img-wrapper:hover .img-caption { opacity:1; transform:translateY(0); }

        /* Lightbox */
        #lightbox { position:fixed; inset:0; background:rgba(0,0,0,0); z-index:9999; pointer-events:none; transition:background .5s ease; }
        #lightbox.active { background:rgba(0,0,0,.97); pointer-events:auto; }
        #zoom-img { 
            position:fixed; top:0; left:0; z-index:10000; 
            object-fit:contain; border-radius:var(--radius); display:none; 
            pointer-events:none; will-change:transform, opacity; 
            transform-origin: top left; 
        }

        @media(max-width:900px){ .image-section { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width:600px){ .image-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="back"><a href="index.html">← Back to Portfolio</a></div>

<div class="container">
    <h1 id="title">Loading...</h1>
    <div class="top-section">
        <div class="info">
            <strong>Project Insight</strong>
            <div id="description"></div>
            <strong>Technical Specs</strong>
            <ul class="tech-list" id="techDetails"></ul>
        </div>
        <div class="viewer" id="viewerBlock"><iframe id="viewer"></iframe></div>
    </div>

    <div class="hero-section">
        <div id="heroReveal">
            <div class="img-wrapper" id="heroWrapper">
                <img id="hero">
                <div class="img-caption" id="heroCaption"></div>
            </div>
        </div>
    </div>

    <div class="image-section" id="gallery"></div>
</div>

<div id="lightbox"><img id="zoom-img"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const projectSlug = params.get("project");
    const lightbox = document.getElementById("lightbox");
    const zoomImg = document.getElementById("zoom-img");
    let activeOriginImg = null;
    let animating = false;
    const appleBezier = "cubic-bezier(0.28, 0.84, 0.42, 1)";

    function formatCaption(n){
        return n.split('/').pop().split('.').slice(0,-1).join('.').replace(/_/g,' ').toUpperCase();
    }

    const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if(e.isIntersecting) { e.target.classList.add("reveal"); revealObserver.unobserve(e.target); }
        });
    }, {threshold: 0.1});

    async function loadProduct(){
        if(!projectSlug) return;
        try {
            const res = await fetch(`models/${projectSlug}/info.json`);
            const data = await res.json();
            
            document.getElementById("title").innerText = data.info.title;
            document.getElementById("description").innerText = data.info.description;
            
            const tech = data.technical;
            document.getElementById("techDetails").innerHTML = `
                <li><span>Dimensions</span><b>${tech.scale} ${tech.unit}</b></li>
                <li><span>Geometry</span><b>${tech.polycount.Total || tech.polycount.pair} TRIS</b></li>
                <li><span>Software</span><b>${tech.software[0]} / ${tech.render_engine}</b></li>
                <li><span>Materials</span><b>4K PBR WORKFLOW</b></li>
            `;

            // XỬ LÝ HERO (Dùng Promise để đợi ảnh load xong mới hiện)
            if(data.media?.hero) {
                const heroEl = document.getElementById("hero");
                const heroReveal = document.getElementById("heroReveal");
                const heroPath = `models/${projectSlug}/images/${data.media.hero}`;
                
                heroEl.src = heroPath;
                heroEl.onload = () => {
                    heroReveal.style.display = "block";
                    setTimeout(() => heroReveal.classList.add("reveal"), 50);
                };
                heroEl.onerror = () => { console.warn("Hero not found at:", heroPath); };
                
                document.getElementById("heroCaption").innerText = formatCaption(data.media.hero);
                document.getElementById("heroWrapper").onclick = () => openSmoothZoom(heroEl);
            }

            // XỬ LÝ GALLERY (Chỉ hiển thị ảnh tồn tại, giữ đúng thứ tự)
            const configRes = await fetch("models/gallery_config.json");
            const config = await configRes.json();
            const gallery = document.getElementById("gallery");

            // Tạo các container rỗng trước để giữ đúng thứ tự trong lúc load
            const placeholders = config.order.map(() => {
                const div = document.createElement("div");
                gallery.appendChild(div);
                return div;
            });

            config.order.forEach((name, index) => {
                const imgPath = `models/${projectSlug}/images/${name}`;
                const tempImg = new Image();
                tempImg.src = imgPath;

                tempImg.onload = () => {
                    placeholders[index].className = "img-reveal-container";
                    placeholders[index].innerHTML = `
                        <div class="img-wrapper">
                            <img src="${imgPath}">
                            <div class="img-caption">${formatCaption(name)}</div>
                        </div>`;
                    revealObserver.observe(placeholders[index]);
                    placeholders[index].querySelector('.img-wrapper').onclick = () => openSmoothZoom(placeholders[index].querySelector('img'));
                };

                tempImg.onerror = () => {
                    placeholders[index].remove(); // Xóa bỏ hoàn toàn nếu ảnh lỗi, không để ô trống
                };
            });

            if(data.viewer?.enabled) document.getElementById("viewer").src = `viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;
            else document.getElementById("viewerBlock").style.display="none";

        } catch(err) { console.error("Load failed:", err); }
    }

    // ZOOM LOGIC (Fix Opacity chỉ cho Zoom-out)
    function openSmoothZoom(originImg){
        if(animating) return;
        activeOriginImg = originImg;
        const scrollBarWidth = window.innerWidth - document.documentElement.clientWidth;
        document.body.style.paddingRight = scrollBarWidth + "px";
        document.body.classList.add("lock-scroll");
        
        const rect = originImg.getBoundingClientRect();
        zoomImg.src = originImg.src;
        zoomImg.style.display = "block";
        zoomImg.style.opacity = "1"; // Zoom-in luôn sáng
        zoomImg.style.width = rect.width + "px";
        zoomImg.style.height = rect.height + "px";
        zoomImg.style.transition = "none";
        zoomImg.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1)`;
        
        zoomImg.offsetHeight; 
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        const imgRatio = rect.width / rect.height;
        const winRatio = (winW - scrollBarWidth) / winH;

        let targetW, targetH;
        if(imgRatio > winRatio){ 
            targetW = (winW - scrollBarWidth) * 0.92; targetH = targetW / imgRatio; 
        } else { 
            targetH = winH * 0.92; targetW = targetH * imgRatio; 
        }

        const scale = targetW / rect.width;
        const targetX = (winW - scrollBarWidth - targetW) / 2;
        const targetY = (winH - targetH) / 2;

        lightbox.classList.add("active");
        originImg.style.visibility = "hidden";

        requestAnimationFrame(() => {
            zoomImg.style.transition = `transform 0.5s ${appleBezier}`; // Bỏ opacity ở đây
            zoomImg.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) scale(${scale})`;
        });
    }

    function closeSmoothZoom(){
        if(!activeOriginImg || animating) return;
        animating = true;
        const rect = activeOriginImg.getBoundingClientRect();
        
        zoomImg.style.transition = `transform 0.45s ${appleBezier}, opacity 0.4s ease-in`;
        zoomImg.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1)`;
        zoomImg.style.opacity = "0"; // Chỉ Zoom-out mới mờ dần
        
        lightbox.classList.remove("active");
        setTimeout(() => {
            if(activeOriginImg) activeOriginImg.style.visibility = "visible";
            zoomImg.style.display = "none";
            document.body.classList.remove("lock-scroll");
            document.body.style.paddingRight = "0px";
            activeOriginImg = null;
            animating = false;
        }, 470);
    }

    lightbox.onclick = closeSmoothZoom;
    window.addEventListener("keydown", e => { if(e.key === "Escape") closeSmoothZoom(); });
    loadProduct();
</script>
</body>
</html>
