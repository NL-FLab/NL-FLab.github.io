<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NL-FLab Product</title>
    <style>
        /* ================================
        GLOBAL
        ================================ */
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a1a1a, #0f0f0f 60%);
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* ================================
        CONTAINER & LAYOUT
        ================================ */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 24px;
        }

        .back {
            max-width: 1100px;
            margin: 30px auto 0 auto;
            padding: 0 24px;
        }

        .back a {
            font-size: 14px;
            color: #777;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back a:hover { color: #fff; }

        h1 {
            font-weight: 500;
            font-size: clamp(24px, 5vw, 32px); /* Tự co giãn theo màn hình */
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-shadow: 0 0 25px rgba(255,255,255,0.08);
        }

        /* ================================
        INFO & TOP SECTION
        ================================ */
        .top-section {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            align-items: start;
            margin-top: 40px;
        }

        .info {
            color: #8a8a8a;
            line-height: 1.8;
            font-size: 15px;
        }

        .viewer iframe {
            width: 100%;
            aspect-ratio: 1/1;
            border: none;
            border-radius: 15px;
            background: #111;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ================================
        IMAGES (HERO & GALLERY)
        ================================ */
        .hero-section { margin-top: 60px; }

        .hero-section img, .image-section img {
            width: 100%;
            display: block;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .hero-section img:hover, .image-section img:hover {
            transform: translateY(-5px);
        }

        .image-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 60px;
        }

        /* ================================
        LIGHTBOX (Đã sửa để tối ưu Mobile)
        =============================== */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex; /* Dùng flex để căn giữa chuẩn nhất */
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        #lightbox img {
            max-width: 95%;   /* Không quá rộng màn hình */
            max-height: 95vh; /* Không quá cao màn hình */
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            /* Bỏ position absolute cũ để flexbox xử lý */
        }

        /* ================================
        RESPONSIVE
        ================================ */
        @media (max-width: 850px) {
            .top-section { grid-template-columns: 1fr; }
            .image-section { grid-template-columns: 1fr; gap: 20px; }
            .info { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="back"><a href="index.html">← Back to Portfolio</a></div>

    <div class="container">
        <h1 id="title">Loading...</h1>

        <div class="top-section">
            <div class="info" id="description"></div>
            <div class="viewer" id="viewerBlock">
                <iframe id="viewer"></iframe>
            </div>
        </div>

        <div class="hero-section">
            <img id="hero" alt="Hero View">
        </div>

        <div class="image-section" id="gallery"></div>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" alt="Enlarged view">
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const projectSlug = params.get("project");

        async function loadProduct() {
            if (!projectSlug) return;

            try {
                // 1. Load Info
                const res = await fetch(`models/${projectSlug}/info.json`);
                if (!res.ok) throw new Error("404");
                const data = await res.json();

                document.title = `${data.info.title} | NL-FLab`;
                document.getElementById("title").innerText = data.info.title;

                const tech = data.technical;
                document.getElementById("description").innerHTML = `
                    ${data.info.description}<br><br>
                    • Scale: ${tech.scale} (${tech.unit})<br>
                    • Single shoe: ${tech.polycount.single_shoe}<br>
                    • Full pair: ${tech.polycount.pair}<br>
                    • ${tech.textures}<br>
                    • ${tech.software.join(" – ")} – ${tech.render_engine}
                `;

                // 2. Hero & Viewer
                const hero = document.getElementById("hero");
                hero.src = `models/${projectSlug}/${data.media.hero}`;
                hero.onclick = () => openLightbox(hero.src);

                if (data.viewer?.enabled) {
                    document.getElementById("viewer").src = `viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;
                } else {
                    document.getElementById("viewerBlock").style.display = "none";
                }

                // 3. Gallery (Giữ đúng thứ tự config)
                const configRes = await fetch("models/gallery_config.json");
                const config = await configRes.json();
                const gallery = document.getElementById("gallery");
                
                config.order.forEach(name => {
                    const img = document.createElement("img");
                    img.src = `models/${projectSlug}/images/${name}`;
                    img.loading = "lazy";
                    img.onclick = () => openLightbox(img.src);
                    gallery.appendChild(img);
                });

            } catch (err) {
                console.error("Error:", err);
                document.getElementById("title").innerText = "Project Not Found";
            }
        }

        // Lightbox Logic
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden"; // Chống cuộn trang khi đang xem ảnh
        }

        lightbox.onclick = () => {
            lightbox.classList.remove("active");
            document.body.style.overflow = "auto";
        };

        loadProduct();
    </script>
</body>
</html>
