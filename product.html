<style>
    :root {
        --bg: #0c0c0c;
        --text-dim: #888;
        --glow-cyan: rgba(0, 255, 255, 0.5); 
        --ease: cubic-bezier(0.4, 0, 0.2, 1); /* Đường cong mượt hơn */
    }

    /* ... (Giữ nguyên các phần CSS khung ở trên) ... */

    .img-wrapper {
        position: relative;
        border-radius: 12px;
        cursor: zoom-in;
        background: #111;
        overflow: visible; /* Quan trọng để thấy glow */
        aspect-ratio: 1/1;
        transition: transform 0.8s var(--ease); /* Chậm lại cho mềm */
        border: none; /* Bỏ border cứng để tránh lệch */
    }

    /* Tạo lớp viền sáng ẩn */
    .img-wrapper::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 12px;
        padding: 1.5px; /* Độ dày viền */
        background: linear-gradient(to bottom, transparent 40%, var(--glow-cyan) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.8s var(--ease);
        z-index: 1;
    }

    .img-wrapper:hover {
        transform: translateY(-8px);
    }

    .img-wrapper:hover::before {
        opacity: 1;
    }

    /* Hiệu ứng tỏa sáng dưới đáy (U-shape) */
    .img-wrapper::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 10%;
        right: 10%;
        height: 20px;
        background: var(--glow-cyan);
        filter: blur(25px);
        opacity: 0;
        transition: opacity 0.8s var(--ease);
        pointer-events: none;
    }

    .img-wrapper:hover::after {
        opacity: 0.6;
    }

    .img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
        display: block;
        /* Chống viền đen lạ */
        box-shadow: 0 0 0 1px rgba(255,255,255,0.05); 
    }

    /* LIGHTBOX FIX GIẬT BLUR */
    .lightbox-blur {
        position: absolute; inset: 0;
        backdrop-filter: blur(0px);
        z-index: 9998;
        /* Transition blur chậm hơn để khi thu nhỏ nó tan biến từ từ */
        transition: backdrop-filter 1s var(--ease); 
    }
    #lightbox.active .lightbox-blur { backdrop-filter: blur(20px); }
</style>

<script>
    async function loadProduct(){
        // ... (fetch dữ liệu) ...
        const tech = data.technical;
        // Map đúng theo ảnh json ông gửi: technical.polycount.Total
        document.getElementById("techDetails").innerHTML = `
            <li><span>Dimensions</span><b>${tech.scale} (${tech.unit})</b></li>
            <li><span>Geometry</span><b>${tech.polycount.Total}</b></li>
            <li><span>Textures</span><b>${tech.textures}</b></li>
            <li><span>Software</span><b>${tech.software.join(' / ')}</b></li>
            <li><span>Render</span><b>${tech.render_engine}</b></li>
        `;
        // ...
    }

    function closeSmoothZoom(){
        if(!activeOriginImg || animating) return;
        animating = true;
        const rect = activeOriginImg.getBoundingClientRect();
        
        // Thu nhỏ ảnh
        zoomImg.style.transition = "transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
        zoomImg.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1)`;
        
        // Tắt nền trước
        document.querySelector('.lightbox-bg').style.opacity = "0";
        // Tắt blur chậm hơn một chút để không bị khựng
        lightbox.classList.remove("active");
        
        setTimeout(() => {
            activeOriginImg.style.visibility = "visible";
            zoomImg.style.display = "none";
            document.body.classList.remove("lock-scroll");
            document.body.style.paddingRight = "0px";
            animating = false;
        }, 600);
    }
</script>
