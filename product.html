<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<title>NL F.Lab | Portfolio Details</title>

<style>
    body{ margin:0; background:#0c0c0c; color:#e5e5e5; font-family:'Inter',sans-serif; overflow-x:hidden; line-height:1.6; -webkit-font-smoothing:antialiased; }
    body.lock-scroll{ overflow:hidden!important; height:100vh; }
    .container{ max-width:1100px; margin:0 auto; padding:0 12% 80px 12%; }
    .back{ padding:40px 12% 20px 12%; }
    .back a{ font-size:10px; color:#555; text-decoration:none; text-transform:uppercase; letter-spacing:2px; transition:.3s; }
    .back a:hover{ color:#fff; }
    h1{ font-weight:300; font-size:clamp(26px,4vw,36px); margin:10px 0 40px 0; color:#fff; letter-spacing:-.5px; }

    /* TOP SECTION */
    .top-section{ display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; margin-bottom:80px; }
    .info{ color:#888; font-size:14px; font-weight:300; }
    .info strong{ color:#fff; font-weight:400; display:block; margin-bottom:12px; font-size:11px; text-transform:uppercase; letter-spacing:2px; }
    #description{ margin-bottom:30px; }
    .tech-list{ list-style:none; padding:0; margin:0; }
    .tech-list li{ padding:8px 0; border-bottom:1px solid #1a1a1a; font-size:12px; display:flex; justify-content:space-between; }
    .tech-list li span{ color:#444; text-transform:uppercase; font-size:10px; }
    .tech-list li b{ color:#aaa; font-weight:400; }
    .viewer iframe{ width:100%; aspect-ratio:1/1; border:none; border-radius:24px; background:#111; box-shadow:0 30px 60px rgba(0,0,0,.4); }

    /* LAYOUT */
    .hero-section{ margin-bottom:60px; display:flex; justify-content:center; }
    .hero-section .img-wrapper{ width:50%; margin: 0 auto; }
    .image-section{ display:grid; grid-template-columns:1fr 1fr; gap:40px; }

    /* IMAGE WRAPPER - VIỀN SÁNG TINH TẾ */
    .img-wrapper{ 
        position:relative; border-radius:20px; line-height:0; cursor:zoom-in; 
        background:transparent; 
        transition: box-shadow .4s ease, outline .4s ease;
        outline: 1px solid rgba(255,255,255,0);
    }
    
    .img-wrapper img{ 
        width:100%; height:auto; border-radius:20px; 
        transition: filter .4s ease;
        filter: brightness(1); /* Đồng nhất độ sáng */
    }

    /* Hiệu ứng viền sáng khi chuột tới */
    .img-wrapper:hover{ 
        outline: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }

    /* CAPTION */
    .img-caption{
        position:absolute; bottom:20px; left:20px; font-size:10px; font-weight:300; color:rgba(255,255,255,.9);
        text-transform:uppercase; letter-spacing:3px; background:rgba(255,255,255,0.03);
        backdrop-filter:blur(15px) saturate(160%); -webkit-backdrop-filter:blur(15px) saturate(160%);
        padding:8px 18px; border-radius:2px; border:1px solid rgba(255,255,255,.1);
        opacity:0; transform:translateY(10px); transition:all .5s cubic-bezier(.16,1,.3,1); z-index: 5;
        pointer-events: none;
    }
    .img-wrapper:hover .img-caption{ opacity:1; transform:translateY(0); }

    /* REVEAL */
    .img-reveal-container{ opacity:0; transform:translateY(30px); transition: opacity .8s ease, transform .8s cubic-bezier(.22,1,.36,1); }
    .img-reveal-container.reveal{ opacity:1; transform:translateY(0); }

    .section-divider{ width:150px; height:1px; margin:80px auto; background:radial-gradient(circle,rgba(255,255,255,0.4),rgba(255,255,255,0)); }

    /* LIGHTBOX */
    #lightbox{ position:fixed; inset:0; background:rgba(0,0,0,0); z-index:9999; pointer-events:none; transition:background .4s ease; }
    #lightbox.active{ background:rgba(0,0,0,.97); pointer-events:auto; }
    
    #zoom-img{ 
        position:fixed; top:0; left:0; z-index:10000; object-fit:contain; border-radius:20px; 
        display:none; pointer-events:none; will-change:transform; transform-origin:top left;
        filter: brightness(1); /* Giữ nguyên độ sáng khi zoom */
    }

    @media(max-width:850px){
        .container{ padding:0 6% 60px 6%; }
        .top-section{ grid-template-columns:1fr; gap:40px; }
        .hero-section .img-wrapper{ width:100%; }
        .image-section{ grid-template-columns:1fr; }
    }
</style>
</head>
<body>

<div class="back"><a href="index.html">← Back to Portfolio</a></div>
<div class="container">
    <h1 id="title">Loading...</h1>
    <div class="top-section">
        <div class="info">
            <strong>Project Insight</strong>
            <div id="description"></div>
            <strong>Technical Specs</strong>
            <ul class="tech-list" id="techDetails"></ul>
        </div>
        <div class="viewer" id="viewerBlock"><iframe id="viewer"></iframe></div>
    </div>
    
    <div class="hero-section">
        <div class="img-reveal-container" id="heroReveal">
            <div class="img-wrapper" id="heroWrapper">
                <img id="hero">
                <div class="img-caption" id="heroCaption"></div>
            </div>
        </div>
    </div>

    <div class="section-divider"></div>
    <div class="image-section" id="gallery"></div>
</div>

<div id="lightbox"><img id="zoom-img"></div>

<script>
const params=new URLSearchParams(window.location.search);
const projectSlug=params.get("project");

function formatCaption(fileName){
    let baseName=fileName.split('/').pop();
    let name=baseName.split('.').slice(0,-1).join('.');
    return name.replace(/_/g,' ').toUpperCase();
}

async function loadProduct(){
    if(!projectSlug)return;
    try{
        const res = await fetch(`models/${projectSlug}/info.json`);
        const data = await res.json();
        document.getElementById("title").innerText = data.info.title;
        document.getElementById("description").innerText = data.info.description;
        const tech = data.technical;
        document.getElementById("techDetails").innerHTML = `
            <li><span>Dimensions</span><b>${tech.scale} ${tech.unit}</b></li>
            <li><span>Geometry</span><b>${tech.polycount.pair} TRIS</b></li>
            <li><span>Materials</span><b>PBR WORKFLOW</b></li>
            <li><span>Pipeline</span><b>${tech.software[0]} / ${tech.render_engine}</b></li>
        `;

        const hero = document.getElementById("hero");
        hero.src = `models/${projectSlug}/${data.media.hero}`;
        document.getElementById("heroCaption").innerText = formatCaption(data.media.hero);
        document.getElementById("heroWrapper").onclick = () => openSmoothZoom(hero);
        hero.onerror = () => { document.querySelector(".hero-section").style.display="none"; };

        const configRes = await fetch("models/gallery_config.json");
        const config = await configRes.json();
        const gallery = document.getElementById("gallery");

        config.order.forEach(name => {
            const revealContainer = document.createElement("div");
            revealContainer.className = "img-reveal-container";
            const wrapper = document.createElement("div");
            wrapper.className = "img-wrapper";
            const img = document.createElement("img");
            img.src = `models/${projectSlug}/images/${name}`;
            img.onerror = () => revealContainer.remove();
            const cap = document.createElement("div");
            cap.className = "img-caption";
            cap.innerText = formatCaption(name);
            wrapper.append(img, cap);
            wrapper.onclick = () => openSmoothZoom(img);
            revealContainer.append(wrapper);
            gallery.append(revealContainer);
        });

        initReveal();
        if(data.viewer?.enabled){
            document.getElementById("viewer").src=`viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;
        } else {
            document.getElementById("viewerBlock").style.display="none";
        }
    } catch(err) { console.error(err); }
}

const lightbox = document.getElementById("lightbox");
const zoomImg = document.getElementById("zoom-img");
let activeOriginImg = null;
let animating = false;
const appleBezier = "cubic-bezier(.28, .84, .42, 1)"; 

function openSmoothZoom(originImg){
    if(animating) return;
    activeOriginImg = originImg;
    
    const rect = originImg.getBoundingClientRect();
    zoomImg.src = originImg.src;
    zoomImg.style.display = "block";
    zoomImg.style.width = rect.width + "px";
    zoomImg.style.height = rect.height + "px";
    zoomImg.style.transition = "none";
    zoomImg.style.transform = `translate3d(${rect.left}px,${rect.top}px,0) scale(1)`;
    zoomImg.offsetHeight;

    const winW = window.innerWidth;
    const winH = window.innerHeight;
    const imgRatio = rect.width/rect.height;
    const winRatio = winW/winH;

    let targetW, targetH;
    if(imgRatio > winRatio){ targetW = winW * .92; targetH = targetW / imgRatio; }
    else { targetH = winH * .92; targetW = targetH * imgRatio; }

    const scale = targetW / rect.width;
    const targetX = (winW - targetW) / 2;
    const targetY = (winH - targetH) / 2;

    document.body.style.paddingRight = (window.innerWidth - document.documentElement.clientWidth) + "px";
    document.body.classList.add("lock-scroll");
    lightbox.classList.add("active");
    originImg.style.visibility = "hidden";

    requestAnimationFrame(() => {
        zoomImg.style.transition = `transform .5s ${appleBezier}`;
        zoomImg.style.transform = `translate3d(${targetX}px,${targetY}px,0) scale(${scale})`;
    });
}

function closeSmoothZoom(){
    if(!activeOriginImg || animating) return;
    animating = true;

    const rect = activeOriginImg.getBoundingClientRect();
    zoomImg.style.transition = `transform .45s ${appleBezier}`;
    zoomImg.style.transform = `translate3d(${rect.left}px,${rect.top}px,0) scale(1)`;
    lightbox.classList.remove("active");

    setTimeout(() => {
        activeOriginImg.style.visibility = "visible";
        zoomImg.style.display = "none";
        document.body.classList.remove("lock-scroll");
        document.body.style.paddingRight = "";
        activeOriginImg = null;
        animating = false;
    }, 470);
}

lightbox.onclick = closeSmoothZoom;
window.addEventListener("keydown", e => { if(e.key === "Escape") closeSmoothZoom(); });

function initReveal(){
    const elements = document.querySelectorAll(".img-reveal-container");
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting) entry.target.classList.add("reveal");
        });
    }, {threshold:.1});
    elements.forEach(el => observer.observe(el));
}

loadProduct();
</script>
</body>
</html>
