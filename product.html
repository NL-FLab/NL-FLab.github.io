<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <title>NL F.Lab | Portfolio Details</title>
    <style>
        /* =================================================
        GLOBAL & SYNC
        ================================================= */
        body {
            margin: 0; background: #0c0c0c; color: #e5e5e5;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden; line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 12% 80px 12%; }

        /* BACK BUTTON */
        .back { padding: 40px 12% 20px 12%; }
        .back a {
            font-size: 10px; color: #555; text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .back a:hover { color: #fff; }

        h1 {
            font-weight: 400; font-size: clamp(26px, 4vw, 36px);
            margin: 10px 0 40px 0; letter-spacing: -0.01em; color: #fff;
        }

        /* TOP SECTION */
        .top-section {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 80px; align-items: center; margin-bottom: 80px;
        }

        .info { color: #888; font-size: 14px; font-weight: 300; }
        .info strong { 
            color: #fff; font-weight: 400; display: block; 
            margin-bottom: 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
        }
        #description { margin-bottom: 30px; line-height: 1.8; }

        .tech-list { list-style: none; padding: 0; margin: 0; }
        .tech-list li {
            padding: 8px 0; border-bottom: 1px solid #1a1a1a;
            font-size: 12px; display: flex; justify-content: space-between;
        }
        .tech-list li span { color: #444; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .tech-list li b { color: #aaa; font-weight: 400; }

        .viewer iframe {
            width: 100%; aspect-ratio: 1/1; border: none; 
            border-radius: 24px; background: #111; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        /* =================================================
        IMAGES & CAPTION
        ================================================= */
        .hero-section { margin-bottom: 60px; display: flex; justify-content: center; }

        .img-wrapper {
            position: relative; overflow: hidden; border-radius: 24px; 
            line-height: 0; cursor: zoom-in; background: #111;
        }

        .img-wrapper img {
            width: 100%; height: auto;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1), filter 0.8s;
        }

        .hero-section .img-wrapper { width: 75%; }

        /* Label với nền mờ kiểu Apple - Đã chỉnh lại Width */
        .img-caption {
            position: absolute; bottom: 15px; left: 15px;
            font-size: 9px; color: rgba(255,255,255,0.8);
            text-transform: uppercase; letter-spacing: 1.2px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 6px 16px; border-radius: 20px;
            min-width: 100px; text-align: center;
            opacity: 0; transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            pointer-events: none; z-index: 2;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .img-wrapper:hover img { transform: scale(1.03); filter: brightness(1.1); }
        .img-wrapper:hover .img-caption { opacity: 1; transform: translateY(0); }

        /* THANH NGĂN PHÁT SÁNG */
        .section-divider {
            width: 150px; height: 1px; margin: 80px auto;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 80%);
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .image-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        /* =================================================
        SMOOTH ZOOM LIGHTBOX (FIXED VERSION)
        ================================================= */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0);
            z-index: 9999; pointer-events: none; transition: background 0.6s ease;
        }
        #lightbox.active { background: rgba(0,0,0,0.98); pointer-events: auto; }

        /* Ảnh ảo để thực hiện chuyển động zoom */
        #zoom-img {
            position: fixed; z-index: 10000;
            object-fit: contain; border-radius: 24px;
            transition: all 0.7s cubic-bezier(0.2, 1, 0.2, 1);
            pointer-events: none; will-change: all;
            display: none;
        }

        /* Phẳng hóa bo tròn khi ảnh ra giữa */
        #lightbox.active #zoom-img { border-radius: 4px; }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            .container { padding: 0 6% 60px 6%; }
            .top-section { grid-template-columns: 1fr; gap: 40px; }
            .hero-section .img-wrapper { width: 100%; }
            .image-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="back"><a href="index.html">← Back to Portfolio</a></div>

    <div class="container">
        <h1 id="title">Loading...</h1>

        <div class="top-section">
            <div class="info">
                <strong>Project Insight</strong>
                <div id="description"></div>
                
                <strong>Technical Specs</strong>
                <ul class="tech-list" id="techDetails"></ul>
            </div>
            <div class="viewer" id="viewerBlock">
                <iframe id="viewer"></iframe>
            </div>
        </div>

        <div class="hero-section">
            <div class="img-wrapper" id="heroWrapper">
                <img id="hero" alt="">
                <div class="img-caption" id="heroCaption"></div>
            </div>
        </div>

        <div class="section-divider"></div>

        <div class="image-section" id="gallery"></div>
    </div>

    <div id="lightbox">
        <img id="zoom-img" alt="">
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const projectSlug = params.get("project");

        function formatCaption(fileName) {
            let name = fileName.split('.').slice(0, -1).join('.');
            return name.replace(/_/g, ' ').toUpperCase();
        }

        async function loadProduct() {
            if (!projectSlug) return;
            try {
                const res = await fetch(`models/${projectSlug}/info.json`);
                const data = await res.json();
                document.getElementById("title").innerText = data.info.title;
                document.getElementById("description").innerText = data.info.description;

                const tech = data.technical;
                document.getElementById("techDetails").innerHTML = `
                    <li><span>Scale</span> <b>${tech.scale} ${tech.unit}</b></li>
                    <li><span>Geometry</span> <b>${tech.polycount.pair} TRIS</b></li>
                    <li><span>Materials</span> <b>PBR WORKFLOW</b></li>
                    <li><span>Pipeline</span> <b>${tech.software[0]} / ${tech.render_engine}</b></li>
                `;

                const hero = document.getElementById("hero");
                hero.src = `models/${projectSlug}/${data.media.hero}`;
                document.getElementById("heroCaption").innerText = formatCaption(data.media.hero);
                document.getElementById("heroWrapper").onclick = () => openSmoothZoom(hero);

                const configRes = await fetch("models/gallery_config.json");
                const config = await configRes.json();
                const gallery = document.getElementById("gallery");
                
                config.order.forEach((name) => {
                    const wrapper = document.createElement("div");
                    wrapper.className = "img-wrapper";
                    const img = document.createElement("img");
                    img.src = `models/${projectSlug}/images/${name}`;
                    const caption = document.createElement("div");
                    caption.className = "img-caption";
                    caption.innerText = formatCaption(name);
                    wrapper.append(img, caption);
                    wrapper.onclick = () => openSmoothZoom(img);
                    gallery.appendChild(wrapper);
                });

                if (data.viewer?.enabled) {
                    document.getElementById("viewer").src = `viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;
                } else {
                    document.getElementById("viewerBlock").style.display = "none";
                }
            } catch (err) { console.error(err); }
        }

        // =================================================
        // NEW ELITE ZOOM LOGIC (NO JANK)
        // =================================================
        const lightbox = document.getElementById("lightbox");
        const zoomImg = document.getElementById("zoom-img");
        let activeOriginImg = null;

        function openSmoothZoom(originImg) {
            activeOriginImg = originImg;
            const rect = originImg.getBoundingClientRect();
            
            // Khởi tạo vị trí chính xác tuyệt đối
            zoomImg.src = originImg.src;
            zoomImg.style.display = "block";
            zoomImg.style.transition = "none"; // Tắt transition để set vị trí gốc
            
            zoomImg.style.top = rect.top + "px";
            zoomImg.style.left = rect.left + "px";
            zoomImg.style.width = rect.width + "px";
            zoomImg.style.height = rect.height + "px";

            // Ép trình duyệt nhận vị trí gốc trước khi bung
            zoomImg.offsetWidth; 

            lightbox.classList.add("active");
            document.body.style.overflow = "hidden";
            originImg.style.visibility = "hidden";

            // Bắt đầu bung ra
            zoomImg.style.transition = "all 0.6s cubic-bezier(0.2, 1, 0.2, 1)";
            
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const imgRatio = rect.width / rect.height;
            const winRatio = winW / winH;

            let tw, th;
            if (imgRatio > winRatio) {
                tw = winW * 0.9;
                th = tw / imgRatio;
            } else {
                th = winH * 0.9;
                tw = th * imgRatio;
            }

            zoomImg.style.top = (winH - th) / 2 + "px";
            zoomImg.style.left = (winW - tw) / 2 + "px";
            zoomImg.style.width = tw + "px";
            zoomImg.style.height = th + "px";
        }

        lightbox.onclick = () => {
            if (!activeOriginImg) return;
            
            const rect = activeOriginImg.getBoundingClientRect();
            
            // Thu nhỏ về đúng tọa độ hiện tại của ảnh gốc
            zoomImg.style.top = rect.top + "px";
            zoomImg.style.left = rect.left + "px";
            zoomImg.style.width = rect.width + "px";
            zoomImg.style.height = rect.height + "px";
            
            lightbox.classList.remove("active");

            // Xử lý dứt điểm sau khi hiệu ứng kết thúc
            const finishSelection = () => {
                activeOriginImg.style.visibility = "visible";
                zoomImg.style.display = "none";
                document.body.style.overflow = "auto";
                zoomImg.removeEventListener('transitionend', finishSelection);
            };
            
            zoomImg.addEventListener('transitionend', finishSelection);
        };

        loadProduct();
    </script>
</body>
</html>
