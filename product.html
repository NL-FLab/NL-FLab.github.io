<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <title>NL F.Lab | Portfolio Details</title>
    <style>
        :root {
            --bg: #0c0c0c;
            --text-main: #e5e5e5;
            --accent: #333;
            --apple-ease: cubic-bezier(.28, .84, .42, 1);
        }

        body { margin:0; background:var(--bg); color:var(--text-main); font-family:'Inter',sans-serif; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
        body.lock-scroll { overflow:hidden!important; }
        
        .container { max-width:1100px; margin:0 auto; padding:0 10% 80px 10%; }
        .back { padding:40px 10% 20px 10%; max-width:1100px; margin:0 auto; }
        .back a { font-size:10px; color:#555; text-decoration:none; text-transform:uppercase; letter-spacing:2px; transition:.3s; }
        .back a:hover { color:#fff; }
        
        h1 { font-weight:300; font-size:clamp(26px,4vw,36px); margin:10px 0 40px 0; color:#fff; }

        .top-section { display:grid; grid-template-columns:1fr 1fr; gap:80px; margin-bottom:80px; }
        .info strong { color:#fff; display:block; margin-bottom:12px; font-size:11px; text-transform:uppercase; letter-spacing:2px; border-left: 2px solid #222; padding-left: 12px; }
        #description { margin-bottom:30px; color: #888; font-size: 14px; text-align: justify; }
        .tech-list { list-style:none; padding:0; margin:0; }
        .tech-list li { padding:10px 0; border-bottom:1px solid #1a1a1a; font-size:12px; display:flex; justify-content:space-between; }
        .tech-list li span { color:#444; text-transform:uppercase; font-size:10px; }
        .tech-list li b { color:#aaa; font-weight:400; }
        .viewer iframe { width:100%; aspect-ratio:16/9; border:none; border-radius:12px; background:#111; }

        .image-section { display:grid; grid-template-columns:1fr 1fr; gap:40px; }
        .img-reveal-container { opacity:0; transform:translateY(30px); transition: opacity .8s ease, transform .8s var(--apple-ease); }
        .img-reveal-container.reveal { opacity:1; transform:translateY(0); }

        .img-wrapper { position:relative; border-radius:15px; overflow:hidden; cursor:zoom-in; background:#111; transition: transform .5s var(--apple-ease); }
        .img-wrapper:hover { transform: translateY(-8px); }
        .img-wrapper img { width:100%; display: block; transition: opacity 1s ease; opacity: 0; }
        .img-wrapper img.loaded { opacity: 1; }

        .img-caption {
            position:absolute; bottom:20px; left:20px; font-size:9px; color:#fff;
            text-transform:uppercase; letter-spacing:2px; background:rgba(0,0,0,0.6);
            backdrop-filter:blur(10px); padding:6px 14px; border-radius:2px; 
            opacity:0; transform:translateY(10px); transition: .4s ease;
        }
        .img-wrapper:hover .img-caption { opacity:1; transform:translateY(0); }

        #lightbox { position:fixed; inset:0; background:rgba(0,0,0,0); z-index:9999; pointer-events:none; transition:background .5s ease; }
        #lightbox.active { background:rgba(0,0,0,.96); pointer-events:auto; }
        #zoom-img { position:fixed; top:0; left:0; z-index:10000; object-fit:contain; border-radius:12px; display:none; pointer-events:none; will-change:transform; transform-origin:top left; }

        @media(max-width:850px){ .top-section { grid-template-columns:1fr; } .image-section { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div class="back"><a href="index.html">← Back to Portfolio</a></div>

<div class="container">
    <h1 id="title">Loading Project...</h1>
    <div class="top-section">
        <div class="info">
            <strong>Project Insight</strong>
            <div id="description"></div>
            <strong>Technical Specs</strong>
            <ul class="tech-list" id="techDetails"></ul>
        </div>
        <div class="viewer" id="viewerBlock"><iframe id="viewer"></iframe></div>
    </div>
    <div class="image-section" id="gallery"></div>
</div>

<div id="lightbox"><img id="zoom-img"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const projectSlug = params.get("project");
    const lightbox = document.getElementById("lightbox");
    const zoomImg = document.getElementById("zoom-img");
    let activeOriginImg = null;
    let animating = false;
    const appleBezier = "cubic-bezier(.28, .84, .42, 1)";

    function formatCaption(n){
        return n.split('/').pop().split('.').slice(0,-1).join('.').replace(/_/g,' ').toUpperCase();
    }

    // Observer hiệu ứng xuất hiện
    const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.classList.add("reveal");
                revealObserver.unobserve(entry.target);
            }
        });
    }, {threshold: 0.1});

    async function loadProduct(){
        if(!projectSlug) return;
        try {
            const res = await fetch(`models/${projectSlug}/info.json`);
            const data = await res.json();
            
            document.getElementById("title").innerText = data.info.title;
            document.getElementById("description").innerText = data.info.description;
            const tech = data.technical;
            document.getElementById("techDetails").innerHTML = `
                <li><span>Dimensions</span><b>${tech.scale} ${tech.unit}</b></li>
                <li><span>Geometry</span><b>${tech.polycount.Total || tech.polycount.pair} TRIS</b></li>
                <li><span>Materials</span><b>PBR WORKFLOW</b></li>
                <li><span>Software</span><b>${tech.software[0]} / ${tech.render_engine}</b></li>
            `;

            if(data.viewer?.enabled) document.getElementById("viewer").src = `viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;
            else document.getElementById("viewerBlock").style.display="none";

            const configRes = await fetch("models/gallery_config.json");
            const config = await configRes.json();
            const gallery = document.getElementById("gallery");

            config.order.forEach(name => {
                const revealContainer = document.createElement("div");
                revealContainer.className = "img-reveal-container";
                revealContainer.innerHTML = `
                    <div class="img-wrapper">
                        <img src="models/${projectSlug}/images/${name}">
                        <div class="img-caption">${formatCaption(name)}</div>
                    </div>`;
                gallery.appendChild(revealContainer);
                revealObserver.observe(revealContainer);
                
                const img = revealContainer.querySelector('img');
                img.onload = () => img.classList.add("loaded");
                revealContainer.querySelector('.img-wrapper').onclick = () => openSmoothZoom(img);
            });
        } catch(err) { console.error(err); }
    }

    function openSmoothZoom(originImg){
        if(animating) return;
        activeOriginImg = originImg;
        
        const scrollBarWidth = window.innerWidth - document.documentElement.clientWidth;
        document.body.style.paddingRight = scrollBarWidth + "px";
        document.body.classList.add("lock-scroll");
        
        const rect = originImg.getBoundingClientRect();
        zoomImg.src = originImg.src;
        zoomImg.style.display = "block";
        zoomImg.style.width = rect.width + "px";
        zoomImg.style.height = rect.height + "px";
        zoomImg.style.transition = "none";
        // Đặt tại vị trí chính xác của ảnh gốc
        zoomImg.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1)`;
        
        zoomImg.offsetHeight; // Force reflow

        const winW = window.innerWidth;
        const winH = window.innerHeight;
        const imgRatio = rect.width / rect.height;
        const winRatio = winW / winH;

        let targetW, targetH;
        if(imgRatio > winRatio){ 
            targetW = winW * .92; targetH = targetW / imgRatio; 
        } else { 
            targetH = winH * .92; targetW = targetH * imgRatio; 
        }

        const scale = targetW / rect.width;
        const targetX = (winW - targetW - scrollBarWidth) / 2;
        const targetY = (winH - targetH) / 2;

        lightbox.classList.add("active");
        originImg.style.visibility = "hidden";

        requestAnimationFrame(() => {
            zoomImg.style.transition = `transform .5s ${appleBezier}`;
            zoomImg.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) scale(${scale})`;
        });
    }

    function closeSmoothZoom(){
        if(!activeOriginImg || animating) return;
        animating = true;
        
        const rect = activeOriginImg.getBoundingClientRect();
        
        // Quay về đúng tọa độ rect.left/top của ảnh gốc với scale(1)
        zoomImg.style.transition = `transform .45s ${appleBezier}, opacity .3s ease`;
        zoomImg.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1)`;
        
        lightbox.classList.remove("active");

        setTimeout(() => {
            if(activeOriginImg) activeOriginImg.style.visibility = "visible";
            zoomImg.style.display = "none";
            document.body.classList.remove("lock-scroll");
            document.body.style.paddingRight = "0px";
            activeOriginImg = null;
            animating = false;
        }, 470);
    }

    lightbox.onclick = closeSmoothZoom;
    window.addEventListener("keydown", e => { if(e.key === "Escape") closeSmoothZoom(); });
    window.addEventListener("resize", () => { if(activeOriginImg) closeSmoothZoom(); });

    loadProduct();
</script>
</body>
</html>
