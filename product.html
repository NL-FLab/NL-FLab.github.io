<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<title>NL F.Lab | Portfolio Details</title>

<style>

:root{
--bg:#0c0c0c;
--text-main:#e5e5e5;
--text-dim:#888;
--accent:#333;
--glow-cyan: rgba(0,255,255,.6);
--ease:cubic-bezier(.4,0,.2,1);
}

body{
margin:0;
background:var(--bg);
color:var(--text-main);
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

body.lock-scroll{overflow:hidden!important;}

.container{
max-width:1100px;
margin:0 auto;
padding:0 10% 80px;
opacity:0;
transform:translateY(15px);
transition:opacity 1.2s var(--ease),transform 1.2s var(--ease);
}

.container.page-loaded{
opacity:1;
transform:translateY(0);
}

.back{
padding:40px 10% 10px;
max-width:1100px;
margin:0 auto;
}

.back a{
font-size:10px;
color:var(--accent);
text-decoration:none;
text-transform:uppercase;
letter-spacing:2px;
}

h1{
font-weight:300;
font-size:clamp(24px,4vw,32px);
margin:0 0 48px;
}

.top-section{
display:grid;
grid-template-columns:1fr 1.2fr;
gap:80px;
margin-bottom:80px;
}

.info-block{margin-bottom:40px;}

.info-block strong{
font-size:10px;
text-transform:uppercase;
letter-spacing:2px;
display:block;
margin-bottom:16px;
border-left:2px solid #222;
padding-left:12px;
}

#description{
color:var(--text-dim);
font-size:14px;
line-height:1.8;
text-align:justify;
}

.tech-list{
list-style:none;
padding:0;
margin:0;
}

.tech-list li{
padding:12px 0;
border-bottom:1px solid #161616;
font-size:12px;
display:flex;
justify-content:space-between;
}

.viewer-container{
width:100%;
aspect-ratio:16/9;
border-radius:8px;
background:#111;
overflow:hidden;
opacity:0;
transition:opacity 1.5s var(--ease);
}

.viewer-container.loaded{opacity:1;}

.viewer-container iframe{
width:100%;
height:100%;
border:none;
}

.hero-section{
margin:0 auto 60px;
width:40%;
display:none;
justify-content:center;
}

.section-divider{
height:1px;
background:linear-gradient(90deg,transparent,#222,transparent);
margin:80px 0;
}

.image-section{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.img-wrapper{
position:relative;
border-radius:12px;
cursor:zoom-in;
background:#111;
aspect-ratio:1/1;
overflow:hidden;
transition:transform .6s var(--ease);
}

.img-wrapper img{
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
opacity:0;
transition:opacity 1s var(--ease);
}

.img-wrapper img.loaded{opacity:1;}

.img-caption{
position:absolute;
bottom:15px;
left:15px;
font-size:7px;
color:#fff;
text-transform:uppercase;
letter-spacing:2px;
background:rgba(0,0,0,.85);
padding:5px 10px;
opacity:0;
transition:.4s var(--ease);
}

.img-wrapper:hover .img-caption{opacity:1;}

.img-reveal-container{
opacity:0;
transform:translateY(25px);
transition:1.2s var(--ease);
}

.img-reveal-container.reveal{
opacity:1;
transform:translateY(0);
}

/* LIGHTBOX */

#lightbox{
position:fixed;
inset:0;
z-index:9999;
pointer-events:none;
visibility:hidden;
}

#lightbox.active{
pointer-events:auto;
visibility:visible;
}

.lightbox-bg{
position:absolute;
inset:0;
background:rgba(0,0,0,.9);
opacity:0;
transition:opacity .6s var(--ease);
}

#lightbox.active .lightbox-bg{opacity:1;}

.lightbox-blur{
position:absolute;
inset:0;
backdrop-filter:blur(20px);
opacity:0;
transition:opacity .8s var(--ease);
}

#lightbox.active .lightbox-blur{opacity:1;}

#zoom-img{
position:fixed;
top:0;
left:0;
z-index:10000;
object-fit:cover;
border-radius:12px;
opacity:0;
pointer-events:none;
will-change:transform;
transform-origin:top left;
transform:translateZ(0);
}

</style>
</head>

<body>

<div class="back">
<a href="index.html">← Back to Portfolio</a>
</div>

<div class="container" id="mainContainer">

<h1 id="title">Loading...</h1>

<div class="top-section">

<div class="info">

<div class="info-block">
<strong>Project Insight</strong>
<div id="description"></div>
</div>

<div class="info-block">
<strong>Technical Specs</strong>
<ul class="tech-list" id="techDetails"></ul>
</div>

</div>

<div class="viewer-container" id="viewerBlock">
<iframe id="viewer"></iframe>
</div>

</div>

<div class="hero-section" id="heroReveal">
<div class="img-wrapper" id="heroWrapper">
<img id="hero">
<div class="img-caption" id="heroCaption"></div>
</div>
</div>

<div class="section-divider img-reveal-container"></div>

<div class="image-section" id="gallery"></div>

</div>

<div id="lightbox">
<div class="lightbox-blur"></div>
<div class="lightbox-bg"></div>
<img id="zoom-img">
</div>

<script>

const params=new URLSearchParams(window.location.search);
const projectSlug=params.get("project");

function formatCaption(n){
return n.split('/').pop().split('.').slice(0,-1).join('.').replace(/_/g,' ').toUpperCase();
}

const revealObserver=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("reveal");
revealObserver.unobserve(e.target);
}
});
},{threshold:.1});

function validateImage(url){
return new Promise((resolve,reject)=>{
const img=new Image();
img.src=url;
img.onload=()=>resolve(img);
img.onerror=()=>reject();
});
}

async function loadProduct(){

if(!projectSlug) return;

try{

const res=await fetch(`models/${projectSlug}/info.json`);
const data=await res.json();

document.getElementById("title").innerText=data.info.title;
document.getElementById("description").innerText=data.info.description;

const tech=data.technical;

/* FIX POLYGON */
let poly =
tech.polycount?.Total ??
tech.polycount?.total ??
tech.polycount?.tris ??
tech.polycount ??
"";

document.getElementById("techDetails").innerHTML=`
<li><span>Dimensions</span><b>${tech.scale} (${tech.unit})</b></li>
<li><span>Geometry</span><b>${poly}</b></li>
<li><span>Textures</span><b>${tech.textures || '4K PBR'}</b></li>
<li><span>Software</span><b>${tech.software.join(' / ')}</b></li>
<li><span>Render Engine</span><b>${tech.render_engine}</b></li>
`;

setTimeout(()=>{
document.getElementById("mainContainer").classList.add("page-loaded");
},100);

if(data.viewer?.enabled){

const iframe=document.getElementById("viewer");

iframe.src=`viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;

iframe.onload=()=>{
document.getElementById("viewerBlock").classList.add("loaded");
};

}else{

document.getElementById("viewerBlock").style.display="none";

}

const heroUrl=`models/${projectSlug}/${data.media.hero}`;

validateImage(heroUrl).then(imgObj=>{

const hero=document.getElementById("hero");

hero.src=imgObj.src;
hero.classList.add("loaded");

document.getElementById("heroCaption").innerText=formatCaption(data.media.hero);

document.getElementById("heroReveal").style.display="flex";

revealObserver.observe(document.getElementById("heroReveal"));

document.getElementById("heroWrapper").onclick=()=>openSmoothZoom(hero);

});

const configRes=await fetch("models/gallery_config.json");
const config=await configRes.json();

const gallery=document.getElementById("gallery");

config.order.forEach(name=>{

const imgUrl=`models/${projectSlug}/images/${name}`;

validateImage(imgUrl).then(imgObj=>{

const container=document.createElement("div");

container.className="img-reveal-container";

container.innerHTML=`
<div class="img-wrapper">
<img src="${imgObj.src}" class="loaded">
<div class="img-caption">${formatCaption(name)}</div>
</div>
`;

gallery.appendChild(container);

revealObserver.observe(container);

container.querySelector(".img-wrapper").onclick=
()=>openSmoothZoom(container.querySelector("img"));

});

});

revealObserver.observe(document.querySelector(".section-divider"));

}catch(err){console.error(err);}

}

/* ZOOM ENGINE */

const lightbox=document.getElementById("lightbox");
const zoomImg=document.getElementById("zoom-img");

let activeOriginImg=null;
let animating=false;

function openSmoothZoom(originImg){

if(animating) return;

animating=true;
activeOriginImg=originImg;

const sw=window.innerWidth-document.documentElement.clientWidth;

document.body.style.paddingRight=sw+"px";
document.body.classList.add("lock-scroll");

const rect=originImg.getBoundingClientRect();

zoomImg.src=originImg.src;
zoomImg.style.opacity="1";

zoomImg.style.width=rect.width+"px";
zoomImg.style.height=rect.height+"px";

zoomImg.style.transition="none";

zoomImg.style.transform=`translate3d(${rect.left}px,${rect.top}px,0) scale(1)`;

zoomImg.offsetHeight;

const winW=window.innerWidth-sw;
const winH=window.innerHeight;

const imgAspect=originImg.naturalWidth/originImg.naturalHeight;
const winAspect=winW/winH;

let targetW,targetH;

if(imgAspect>winAspect){
targetW=winW*.88;
targetH=targetW/imgAspect;
}else{
targetH=winH*.88;
targetW=targetH*imgAspect;
}

const scale=targetW/rect.width;

const targetX=(winW-targetW)/2;
const targetY=(winH-targetH)/2;

lightbox.classList.add("active");

originImg.style.visibility="hidden";

requestAnimationFrame(()=>{

zoomImg.style.transition="transform .7s cubic-bezier(.4,0,.2,1)";

zoomImg.style.transform=
`translate3d(${targetX}px,${targetY}px,0) scale(${scale})`;

});

setTimeout(()=>animating=false,700);

}

function closeSmoothZoom(){

if(!activeOriginImg||animating) return;

animating=true;

const rect=activeOriginImg.getBoundingClientRect();

zoomImg.style.transition="transform .6s cubic-bezier(.4,0,.2,1)";

zoomImg.style.transform=
`translate3d(${rect.left}px,${rect.top}px,0) scale(1)`;

lightbox.classList.remove("active");

setTimeout(()=>{

activeOriginImg.style.visibility="visible";

zoomImg.style.opacity="0";

document.body.classList.remove("lock-scroll");
document.body.style.paddingRight="0px";

activeOriginImg=null;
animating=false;

},600);

}

document.querySelector(".lightbox-bg").onclick=closeSmoothZoom;

window.addEventListener("keydown",e=>{
if(e.key==="Escape") closeSmoothZoom();
});

loadProduct();

</script>

</body>
</html>
