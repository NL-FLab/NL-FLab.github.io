<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<title>NL F.Lab | Portfolio Details</title>

<style>

body{
margin:0;
background:#0c0c0c;
color:#e5e5e5;
font-family:'Inter',sans-serif;
line-height:1.6;
}

img{
display:block;
max-width:100%;
}

/* container */

.container{
max-width:1200px;
margin:auto;
padding:0 10% 90px;
}

/* back */

.back{
padding:40px 10% 20px;
}

.back a{
font-size:10px;
color:#666;
text-decoration:none;
letter-spacing:2px;
text-transform:uppercase;
}

/* title */

h1{
font-weight:300;
font-size:clamp(26px,4vw,36px);
margin:10px 0 45px;
letter-spacing:-0.02em;
}

/* top section */

.top-section{
display:grid;
grid-template-columns:1fr 1fr;
gap:80px;
align-items:start;
margin-bottom:90px;
}

/* description */

.info{
max-width:420px;
color:#aaa;
font-size:14px;
}

.info strong{
display:block;
font-size:10px;
letter-spacing:2px;
margin-bottom:18px;
color:#fff;
text-transform:uppercase;
}

/* tech grid */

.tech-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:26px 60px;
margin-top:10px;
}

.tech-item span{
display:block;
font-size:10px;
letter-spacing:2px;
text-transform:uppercase;
color:#666;
margin-bottom:4px;
}

.tech-item b{
font-weight:500;
color:#fff;
font-size:15px;
}

/* viewer */

.viewer iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:22px;
background:#111;
}

/* hero */

.hero-section{
display:flex;
justify-content:center;
margin-bottom:70px;
}

.hero-section .img-wrapper{
width:55%;
}

/* images */

.img-wrapper{
position:relative;
overflow:hidden;
border-radius:14px;
cursor:pointer;
background:#111;
}

.img-wrapper img{
transition:transform .45s ease;
will-change:transform;
}

.img-wrapper:hover img{
transform:scale(1.04);
}

/* caption */

.img-caption{
position:absolute;
bottom:16px;
left:16px;
font-size:10px;
letter-spacing:2px;
color:#fff;
background:rgba(0,0,0,.65);
padding:6px 12px;
border-radius:20px;
opacity:0;
transition:.3s;
}

.img-wrapper:hover .img-caption{
opacity:1;
}

/* gallery */

.image-section{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:36px;
}

/* responsive */

@media(max-width:1100px){

.image-section{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:850px){

.top-section{
grid-template-columns:1fr;
}

.image-section{
grid-template-columns:1fr;
}

.hero-section .img-wrapper{
width:100%;
}

.tech-grid{
grid-template-columns:1fr;
}

}

/* lightbox */

#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:opacity .25s ease;
z-index:9999;
cursor:zoom-out;
user-select:none;
}

#lightbox.active{
opacity:1;
pointer-events:auto;
}

#lightbox img{
max-width:92vw;
max-height:92vh;
transform:scale(.96);
transition:transform .28s ease;
border-radius:10px;
}

#lightbox.active img{
transform:scale(1);
}

</style>
</head>

<body>

<div class="back">
<a href="index.html">← Back to Portfolio</a>
</div>

<div class="container">

<h1 id="title">Loading...</h1>

<div class="top-section">

<div class="info">

<strong>Project Insight</strong>

<div id="description"></div>

<br>

<strong>Technical Specs</strong>

<div class="tech-grid" id="techDetails"></div>

</div>

<div class="viewer" id="viewerBlock">
<iframe id="viewer"></iframe>
</div>

</div>

<div class="hero-section" id="heroSection">

<div class="img-wrapper" id="heroWrapper">

<img id="hero">

<div class="img-caption" id="heroCaption"></div>

</div>

</div>

<div class="image-section" id="gallery"></div>

</div>

<div id="lightbox">
<img id="lightbox-img">
</div>

<script>

const title=document.getElementById("title")
const description=document.getElementById("description")
const techDetails=document.getElementById("techDetails")
const hero=document.getElementById("hero")
const heroCaption=document.getElementById("heroCaption")
const heroWrapper=document.getElementById("heroWrapper")
const heroSection=document.getElementById("heroSection")
const gallery=document.getElementById("gallery")
const viewer=document.getElementById("viewer")
const viewerBlock=document.getElementById("viewerBlock")

const lightbox=document.getElementById("lightbox")
const lightboxImg=document.getElementById("lightbox-img")

const params=new URLSearchParams(window.location.search)
const projectSlug=params.get("project")

function formatCaption(fileName){

const base=fileName.split('/').pop()
const name=base.replace(/\.[^/.]+$/, "")

return name.replace(/_/g,' ').toUpperCase()

}

async function loadProduct(){

if(!projectSlug)return

try{

const res=await fetch(`models/${projectSlug}/info.json`)
const data=await res.json()

const info=data.info||{}
const tech=data.technical||{}

title.innerText=info.title||"Untitled Project"
description.innerText=info.description||""

let techHTML=""

if(tech.polycount?.total){

techHTML+=`
<div class="tech-item">
<span>Polycount</span>
<b>${tech.polycount.total}</b>
</div>
`

}

if(tech.scale){

let scaleText=tech.scale

if(tech.unit){
scaleText+=` (${tech.unit})`
}

techHTML+=`
<div class="tech-item">
<span>Scale</span>
<b>${scaleText}</b>
</div>
`

}

if(tech.software){

const softwareText=Array.isArray(tech.software)
? tech.software.join(" / ")
: tech.software

techHTML+=`
<div class="tech-item">
<span>Software</span>
<b>${softwareText}</b>
</div>
`

}

if(tech.render_engine){

techHTML+=`
<div class="tech-item">
<span>Render</span>
<b>${tech.render_engine}</b>
</div>
`

}

if(tech.textures){

techHTML+=`
<div class="tech-item">
<span>Texture Set</span>
<b>${tech.textures}</b>
</div>
`

}

techDetails.innerHTML=techHTML

hero.src=`models/${projectSlug}/${data.media.hero}`
hero.alt=info.title||"Hero Image"

heroCaption.innerText=formatCaption(data.media.hero)

heroWrapper.onclick=()=>openZoom(hero)

hero.onerror=()=>heroSection.style.display="none"

gallery.innerHTML=""

const configRes=await fetch("models/gallery_config.json")
const config=await configRes.json()

if(config?.order){

config.order.forEach(name=>{

const wrapper=document.createElement("div")
wrapper.className="img-wrapper"

const img=document.createElement("img")

img.src=`models/${projectSlug}/images/${name}`
img.alt=formatCaption(name)

img.onerror=()=>wrapper.remove()

const cap=document.createElement("div")
cap.className="img-caption"
cap.innerText=formatCaption(name)

wrapper.append(img,cap)

wrapper.onclick=()=>openZoom(img)

gallery.append(wrapper)

})

}

if(data.viewer?.enabled){

viewer.src=`viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`

}else{

viewerBlock.style.display="none"

}

}catch(e){

console.error("Failed loading product:",e)

}

}

function openZoom(img){

lightboxImg.src=img.src
lightbox.classList.add("active")

}

function closeZoom(){

lightbox.classList.remove("active")
lightboxImg.src=""

}

lightbox.onclick=closeZoom

window.addEventListener("keydown",e=>{
if(e.key==="Escape")closeZoom()
})

loadProduct()

</script>

</body>
</html>
