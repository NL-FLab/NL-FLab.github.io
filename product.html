<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <title>NL F.Lab | Product Details</title>
    <style>
        /* =================================================
        GLOBAL & SYNC
        ================================================= */
        body {
            margin: 0; background: #0c0c0c; color: #e5e5e5;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden; line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 12% 80px 12%; }

        /* BACK BUTTON */
        .back { padding: 40px 12% 20px 12%; }
        .back a {
            font-size: 10px; color: #555; text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .back a:hover { color: #fff; }

        h1 {
            font-weight: 400; font-size: clamp(26px, 4vw, 36px);
            margin: 10px 0 40px 0; letter-spacing: -0.01em; color: #fff;
        }

        /* =================================================
        TOP SECTION
        ================================================= */
        .top-section {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 80px; align-items: center; margin-bottom: 80px;
        }

        .info { color: #888; font-size: 14px; font-weight: 300; }
        .info strong { 
            color: #fff; font-weight: 400; display: block; 
            margin-bottom: 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
        }
        #description { margin-bottom: 30px; line-height: 1.8; }

        .tech-list { list-style: none; padding: 0; margin: 0; }
        .tech-list li {
            padding: 8px 0; border-bottom: 1px solid #1a1a1a;
            font-size: 12px; display: flex; justify-content: space-between;
        }
        .tech-list li span { color: #444; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .tech-list li b { color: #aaa; font-weight: 400; }

        /* 1. BO TRÒN VIEWER */
        .viewer iframe {
            width: 100%; aspect-ratio: 1/1; border: none; 
            border-radius: 24px; /* Tăng độ bo tròn */
            background: #111; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        /* =================================================
        IMAGES & HOVER EFFECTS
        ================================================= */
        .hero-section { 
            margin-bottom: 60px; display: flex; justify-content: center; 
        }

        /* 1. BO TRÒN ẢNH & 4. HIỂN THỊ TÊN NHỎ */
        .img-wrapper {
            position: relative; overflow: hidden; border-radius: 24px; 
            line-height: 0; cursor: zoom-in;
        }

        .img-wrapper img {
            width: 100%; height: auto;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1), 
                        filter 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .hero-section .img-wrapper { width: 75%; }

        /* Label hiện thị nhỏ ở dưới bên trái */
        .img-caption {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 10px; color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 1.5px;
            opacity: 0; transform: translateY(10px);
            transition: all 0.5s ease;
            pointer-events: none; z-index: 2;
        }

        .img-wrapper:hover img { transform: scale(1.03); filter: brightness(1.1); }
        .img-wrapper:hover .img-caption { opacity: 1; transform: translateY(0); }

        /* 2. THANH NGĂN PHÁT SÁNG GIỐNG INDEX */
        .section-divider {
            width: 150px; height: 1px; margin: 80px auto;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 80%);
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .image-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        /* =================================================
        3. ZOOM ANIMATION (LIGHTBOX)
        ================================================= */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            backdrop-filter: blur(25px); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        #lightbox.active { opacity: 1; pointer-events: auto; }

        #lightbox img { 
            max-width: 92%; max-height: 92vh; object-fit: contain;
            transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }
        #lightbox.active img { transform: scale(1); }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            .container { padding: 0 6% 60px 6%; }
            .top-section { grid-template-columns: 1fr; gap: 40px; }
            .hero-section .img-wrapper { width: 100%; }
            .image-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="back"><a href="index.html">← Back to Portfolio</a></div>

    <div class="container">
        <h1 id="title">Loading...</h1>

        <div class="top-section">
            <div class="info">
                <strong>Project Insight</strong>
                <div id="description"></div>
                
                <strong>Technical Specs</strong>
                <ul class="tech-list" id="techDetails"></ul>
            </div>
            <div class="viewer" id="viewerBlock">
                <iframe id="viewer"></iframe>
            </div>
        </div>

        <div class="hero-section">
            <div class="img-wrapper" id="heroWrapper">
                <img id="hero" alt="Master Render">
                <div class="img-caption">Master View</div>
            </div>
        </div>

        <div class="section-divider"></div>

        <div class="image-section" id="gallery"></div>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" alt="Enlarged view">
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const projectSlug = params.get("project");

        async function loadProduct() {
            if (!projectSlug) return;
            try {
                const res = await fetch(`models/${projectSlug}/info.json`);
                const data = await res.json();

                document.title = `${data.info.title} | NL F.Lab`;
                document.getElementById("title").innerText = data.info.title;
                document.getElementById("description").innerText = data.info.description;

                const tech = data.technical;
                document.getElementById("techDetails").innerHTML = `
                    <li><span>Dimensions</span> <b>${tech.scale} ${tech.unit}</b></li>
                    <li><span>Polycount</span> <b>${tech.polycount.pair} tris</b></li>
                    <li><span>Texturing</span> <b>PBR Workflow</b></li>
                    <li><span>Pipeline</span> <b>${tech.software[0]} / ${tech.render_engine}</b></li>
                `;

                const hero = document.getElementById("hero");
                hero.src = `models/${projectSlug}/${data.media.hero}`;
                document.getElementById("heroWrapper").onclick = () => openLightbox(hero.src);

                if (data.viewer?.enabled) {
                    document.getElementById("viewer").src = `viewer/babylon_viewer.html?model=../models/${projectSlug}/${data.viewer.model}`;
                } else {
                    document.getElementById("viewerBlock").style.display = "none";
                    document.querySelector(".top-section").style.gridTemplateColumns = "1fr";
                }

                const configRes = await fetch("models/gallery_config.json");
                const config = await configRes.json();
                const gallery = document.getElementById("gallery");
                
                config.order.forEach((name, index) => {
                    const wrapper = document.createElement("div");
                    wrapper.className = "img-wrapper";
                    
                    const img = document.createElement("img");
                    img.src = `models/${projectSlug}/images/${name}`;
                    img.loading = "lazy";
                    
                    const caption = document.createElement("div");
                    caption.className = "img-caption";
                    caption.innerText = `View ${String(index + 1).padStart(2, '0')}`;
                    
                    wrapper.appendChild(img);
                    wrapper.appendChild(caption);
                    wrapper.onerror = () => wrapper.remove();
                    wrapper.onclick = () => openLightbox(img.src);
                    
                    gallery.appendChild(wrapper);
                });
            } catch (err) { console.error(err); }
        }

        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden";
        }

        lightbox.onclick = () => {
            lightbox.classList.remove("active");
            document.body.style.overflow = "auto";
        };

        loadProduct();
    </script>
</body>
</html>
