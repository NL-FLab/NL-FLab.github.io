<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<title>NL F.Lab – High-end 3D Visualization</title>

<style>

/* GLOBAL */

body{
margin:0;
background:#0c0c0c;
color:#e5e5e5;
font-family:'Inter',-apple-system,sans-serif;
letter-spacing:.02em;
line-height:1.6;
overflow-x:hidden;
position:relative;
}

/* AMBIENT BACKGROUND */

body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200vmax;
height:200vmax;
background:radial-gradient(circle at center,rgba(100,150,255,.05),transparent 35%);
z-index:-1;
animation:ambientMove1 35s infinite alternate ease-in-out;
}

body::after{
content:"";
position:fixed;
bottom:-50%;
right:-50%;
width:180vmax;
height:180vmax;
background:radial-gradient(circle at center,rgba(255,255,255,.03),transparent 35%);
z-index:-1;
animation:ambientMove2 45s infinite alternate-reverse ease-in-out;
}

@keyframes ambientMove1{
0%{transform:translate(-5%,-5%)}
100%{transform:translate(5%,10%)}
}

@keyframes ambientMove2{
0%{transform:translate(5%,5%)}
100%{transform:translate(-10%,-5%)}
}

/* HEADER */

header{padding:80px 12% 20px 12%}

.brand{display:flex;gap:24px}

.logo{
width:100px;
height:100px;
object-fit:contain;
margin-top:15px;
}

h1{
font-size:40px;
font-weight:400;
margin:0;
color:#fff;
}

.subtitle{
font-size:17px;
color:#aaa;
font-weight:300;
}

.hero-role{
margin-top:4px;
font-size:11px;
color:#555;
letter-spacing:3px;
text-transform:uppercase;
}

.hero-divider{
width:150px;
height:1px;
margin:35px auto 12px auto;
background:radial-gradient(circle,rgba(255,255,255,.6),rgba(255,255,255,0));
}

.hero-note{
text-align:center;
font-size:10px;
letter-spacing:3px;
color:#444;
text-transform:uppercase;
margin-bottom:30px;
}

.section{padding:40px 12%}

/* ABOUT */

.about{max-width:900px}

.about h2{
font-size:18px;
font-weight:500;
color:#fff;
margin-bottom:25px;
letter-spacing:2px;
text-transform:uppercase;
}

.about-intro{
font-size:16px;
color:#eee;
margin-bottom:40px;
line-height:1.8;
font-weight:300;
}

.about-intro strong{
color:#fff;
font-weight:500;
}

/* CORE VALUES */

.core-values{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
margin-bottom:50px;
}

.value-item .v-title{
font-size:10px;
letter-spacing:3px;
color:#555;
text-transform:uppercase;
margin-bottom:12px;
}

.value-item .v-text{
font-size:13px;
color:#888;
line-height:1.7;
}

/* HIGHLIGHTS */

.about-highlights{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:35px;
margin-top:50px;
}

.highlight-title{
font-size:10px;
letter-spacing:2px;
text-transform:uppercase;
color:#555;
margin-bottom:10px;
}

.highlight-text{
color:#bbb;
font-size:13px;
line-height:1.7;
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:30px;
}

.skill{
border:1px solid #222;
padding:6px 16px;
font-size:11px;
border-radius:30px;
background:#111;
color:#777;
}

/* CV */

.cv-container{margin-top:40px}

.cv-download-btn{
display:inline-flex;
align-items:center;
padding:10px 22px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.1);
border-radius:50px;
color:#fff;
text-decoration:none;
font-size:10px;
letter-spacing:1.5px;
text-transform:uppercase;
transition:.3s;
}

.cv-download-btn:hover{
background:#fff;
color:#000;
transform:translateY(-2px);
}

/* PORTFOLIO */

.portfolio-header{
margin-top:10px;
margin-bottom:25px;
}

.section-title{
font-size:11px;
color:#555;
letter-spacing:4px;
text-transform:uppercase;
}

/* FILTER */

.filter-container{
display:flex;
margin-bottom:35px;
}

.filter{
display:inline-flex;
padding:4px;
position:relative;
background:rgba(255,255,255,.02);
border-radius:40px;
border:1px solid rgba(255,255,255,.05);
}

.filter-btn{
background:transparent;
border:none;
color:#555;
font-size:10px;
cursor:pointer;
padding:8px 18px;
border-radius:40px;
text-transform:uppercase;
letter-spacing:1.5px;
position:relative;
z-index:2;
}

.filter-btn.active{color:#fff}

.tab-indicator{
position:absolute;
top:4px;
left:4px;
height:calc(100% - 8px);
background:rgba(255,255,255,.07);
border-radius:40px;
transition:.5s cubic-bezier(.23,1,.32,1);
opacity:0;
}

/* GRID TRANSITION */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:30px;
transition:opacity .35s ease,transform .35s ease;
}

.grid.is-changing{
opacity:0;
transform:translateY(10px);
}

/* PROJECT */

.project{
position:relative;
overflow:hidden;
border-radius:12px;
aspect-ratio:1/1;
background:#111;
border:1px solid rgba(255,255,255,.03);

opacity:0;
transform:translateY(25px) scale(.98);

transition:
opacity .9s cubic-bezier(.22,1,.36,1),
transform .9s cubic-bezier(.22,1,.36,1);
}

.project.is-visible{
opacity:1;
transform:translateY(0) scale(1);
}

.project img{
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity .6s ease;
}

.project img.loaded{
opacity:1;
}

.project:hover img{
transform:scale(1.05);
filter:brightness(.3) blur(2px);
}

.project-title{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-40%);
width:80%;
text-align:center;
font-size:11px;
color:#fff;
letter-spacing:2px;
text-transform:uppercase;
opacity:0;
transition:.5s;
}

.project:hover .project-title{
opacity:1;
transform:translate(-50%,-50%);
}

/* CONTACT */

.contact{
margin-top:40px;
padding-bottom:80px;
}

.contact h2{
font-size:18px;
color:#fff;
margin-bottom:25px;
letter-spacing:2px;
text-transform:uppercase;
}

.contact-links{
display:flex;
flex-wrap:wrap;
gap:45px;
}

.contact-links a{
color:#fff;
text-decoration:none;
font-size:12px;
letter-spacing:1.5px;
text-transform:uppercase;
border-bottom:1px solid rgba(255,255,255,.1);
}

.contact-links a:hover{
border-bottom:1px solid #fff;
color:#aaa;
}

footer{
padding:40px 12%;
color:#333;
font-size:10px;
}

/* SECTION FADE */

.fade{
opacity:0;
transform:translateY(15px);
transition:.8s ease-out;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>
