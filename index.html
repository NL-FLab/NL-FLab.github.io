<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NL F.Lab — 3D Artist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================================
GLOBAL
================================ */

body{

margin:0;
background:#0c0c0c;
color:#e5e5e5;
font-family:'Inter',sans-serif;
line-height:1.6;
-webkit-font-smoothing:antialiased;

}

.section{

padding:80px 12%;

}

/* ================================
HERO
================================ */

.hero{

padding:120px 12% 80px 12%;
position:relative;

}

.hero::before{

content:"";
position:absolute;
top:-200px;
left:50%;
transform:translateX(-50%);
width:900px;
height:900px;
background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 60%);
filter:blur(120px);

}

.brand{

display:flex;
align-items:center;
gap:24px;

}

.logo{

width:90px;

}

.hero-title{

font-size:46px;
margin:0;

}

.hero-sub{

color:#999;
margin-top:4px;

}

.hero-role{

margin-top:6px;
font-size:11px;
letter-spacing:3px;
text-transform:uppercase;
color:#555;

}

/* ================================
LIQUID TAB
================================ */

.filter{

position:relative;
display:inline-flex;
padding:6px;
background:#161616;
border-radius:40px;
border:1px solid rgba(255,255,255,0.05);
margin-bottom:50px;

}

.liquid{

position:absolute;
top:0;
left:0;
height:100%;
background:linear-gradient(135deg,#ffffff22,#ffffff08);
border-radius:40px;
transition:all .45s cubic-bezier(.22,1,.36,1);
box-shadow:0 10px 30px rgba(0,0,0,0.7);

}

.tab{

border:none;
background:none;
color:#777;
padding:10px 26px;
cursor:pointer;
font-size:11px;
letter-spacing:1.5px;
text-transform:uppercase;
position:relative;
z-index:2;

}

.tab.active{

color:#fff;

}

/* ================================
PROJECT GRID
================================ */

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:34px;

}

.project{

position:relative;
overflow:hidden;
border-radius:18px;
aspect-ratio:1/1;
background:#000;

}

.project img{

width:100%;
height:100%;
object-fit:cover;

transition:1s cubic-bezier(.2,1,.2,1);

}

.project-overlay{

position:absolute;
inset:0;
background:linear-gradient(
transparent,
rgba(0,0,0,0.7)
);

opacity:0;
transition:.5s;

}

.project-title{

position:absolute;
bottom:30px;
left:30px;

font-size:14px;
letter-spacing:2px;
text-transform:uppercase;

opacity:0;
transform:translateY(10px);
transition:.5s;

}

.project:hover img{

transform:scale(1.1);

}

.project:hover .project-overlay{

opacity:1;

}

.project:hover .project-title{

opacity:1;
transform:translateY(0);

}

/* ================================
ABOUT
================================ */

.about{

max-width:800px;

}

.about h2{

font-size:20px;

}

.about p{

color:#aaa;

}

/* ================================
CONTACT
================================ */

.contact-links{

display:flex;
gap:40px;
margin-top:20px;

}

.contact-links a{

color:#666;
text-decoration:none;

}

.contact-links a:hover{

color:#fff;

}

/* ================================
ANIMATION
================================ */

.fade{

opacity:0;
transform:translateY(20px);
transition:.8s;

}

.fade.show{

opacity:1;
transform:translateY(0);

}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">

<div class="brand">

<img src="images/logo.png" class="logo">

<div>

<h1 class="hero-title">NL F.Lab</h1>
<div class="hero-sub">3D Artist</div>
<div class="hero-role">Product Visualization</div>

</div>

</div>

</section>

<!-- PROJECTS -->

<section class="section">

<div class="filter" id="tabs">

<div class="liquid" id="liquid"></div>

<button class="tab active">All</button>
<button class="tab">Furniture</button>
<button class="tab">Decor</button>
<button class="tab">Props</button>

</div>

<div class="grid">

<div class="project">

<img src="images/demo1.jpg">

<div class="project-overlay"></div>

<div class="project-title">

Oak Chair

</div>

</div>

<div class="project">

<img src="images/demo2.jpg">

<div class="project-overlay"></div>

<div class="project-title">

Modern Table

</div>

</div>

<div class="project">

<img src="images/demo3.jpg">

<div class="project-overlay"></div>

<div class="project-title">

Lamp

</div>

</div>

</div>

</section>

<!-- ABOUT -->

<section class="section about fade">

<h2>About</h2>

<p>

I am Nghia Le, a Senior 3D Artist specializing in Product Visualization and Hard Surface Modeling with more than seven years of professional experience.

</p>

</section>

<!-- CONTACT -->

<section class="section fade">

<h2>Contact</h2>

<div class="contact-links">

<a href="#">Email</a>
<a href="#">ArtStation</a>
<a href="#">LinkedIn</a>

</div>

</section>

<script>

/* liquid tab */

const tabs=document.querySelectorAll(".tab")
const liquid=document.getElementById("liquid")

function move(el){

liquid.style.width=el.offsetWidth+"px"
liquid.style.left=el.offsetLeft+"px"

}

tabs.forEach(tab=>{

tab.onclick=()=>{

tabs.forEach(t=>t.classList.remove("active"))
tab.classList.add("active")
move(tab)

}

})

move(document.querySelector(".tab.active"))

/* reveal animation */

const observer=new IntersectionObserver(entries=>{

entries.forEach(e=>{

if(e.isIntersecting)
e.target.classList.add("show")

})

})

document.querySelectorAll(".fade").forEach(el=>observer.observe(el))

</script>

</body>
</html>
