<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NL F.Lab — Premium Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ================================
        GLOBAL & BACKGROUND (AO EFFECT)
        ================================ */
        body {
            margin: 0; background: radial-gradient(circle at 50% 0%, #161616 0%, #0a0a0a 100%);
            color: #e5e5e5; font-family: 'Inter', sans-serif; line-height: 1.6;
            -webkit-font-smoothing: antialiased; min-height: 100vh;
        }

        .section { padding: 40px 12%; }

        /* ================================
        HEADER & LOGO
        ================================ */
        .header-nav {
            padding: 60px 12% 20px 12%;
            display: flex; align-items: center; gap: 30px;
        }

        .logo-container {
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .logo-container img {
            width: 80%; height: 80%; object-fit: contain;
        }

        .hero-info h1 {
            font-family: 'Syncopate', sans-serif; font-size: 42px; font-weight: 700;
            letter-spacing: -2px; margin: 0; color: #fff; text-transform: uppercase;
        }
        .hero-info p { color: #888; font-size: 16px; margin: 2px 0 0 0; font-weight: 300; }

        /* ================================
        ABOUT SECTION (TRÊN GRID)
        ================================ */
        .about-headline { font-size: 24px; font-weight: 300; color: #ccc; max-width: 800px; margin-bottom: 30px; }
        .about-headline strong { color: #fff; font-weight: 500; }

        /* ================================
        LIQUID GLASS TAB (FIXED CONTEXT)
        ================================ */
        .filter-wrapper { margin: 40px 0; }
        .filter {
            position: relative; display: inline-flex;
            padding: 4px; background: rgba(255,255,255,0.02);
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
        }

        .liquid {
            position: absolute; top: 4px; left: 4px;
            height: calc(100% - 8px); background: #fff;
            border-radius: 40px; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1;
        }

        .tab {
            border: none; background: none; color: #666;
            padding: 12px 25px; cursor: pointer; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
            position: relative; z-index: 2; transition: color 0.4s;
        }

        .tab.active { color: #000; }

        /* ================================
        GRID & PROJECT (SYNC WITH JS)
        ================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px; min-height: 400px;
        }

        /* Đây là cấu trúc mà loadproduct.js của ông sẽ đổ vào */
        .project-card { perspective: 1000px; opacity: 0; transform: translateY(20px); transition: 0.6s; }
        .project-card.show { opacity: 1; transform: translateY(0); }

        .project {
            position: relative; overflow: hidden; border-radius: 16px;
            aspect-ratio: 1/1; background: #111; transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .project img { width: 100%; height: 100%; object-fit: cover; display: block; transition: 0.5s; }
        .project:hover img { transform: scale(1.1); filter: brightness(0.3) blur(4px); }

        .project-title {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%) translateZ(50px);
            width: 80%; text-align: center; font-size: 12px; color: #fff;
            letter-spacing: 2px; text-transform: uppercase; opacity: 0;
            transition: 0.4s ease; pointer-events: none;
        }
        .project:hover .project-title { opacity: 1; transform: translate(-50%, -50%) translateZ(80px); }

        footer { padding: 40px 12%; border-top: 1px solid #1a1a1a; font-size: 10px; color: #333; margin-top: 60px; }
    </style>
</head>

<body>

    <header class="header-nav">
        <div class="logo-container">
            <img src="images/logo.png" alt="NL F.Lab Logo">
        </div>
        <div class="hero-info">
            <h1>NL F.Lab</h1>
            <p>3D Visualization & Product Design</p>
        </div>
    </header>

    <section class="section">
        <div class="about-headline">
            I am <strong>Nghia Le</strong>, a Senior 3D Artist and <strong>Team Leader</strong>. 
            Focusing on <strong>Technical Precision</strong> and premium aesthetics in product visualization.
        </div>

        <div class="filter-wrapper">
            <div class="filter" id="tabs">
                <div class="liquid" id="liquid"></div>
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="furniture">Furniture</button>
                <button class="tab" data-filter="decor">Decor</button>
                <button class="tab" data-filter="props">Props</button>
            </div>
        </div>

        <div class="grid" id="projectGrid"></div>
    </section>

    <footer>© 2026 NL F.LAB — INDEPENDENT 3D STUDIO</footer>

    <script>
        /* 1. LIQUID TAB LOGIC (Hỗ trợ cả Click & Window Resize) */
        const tabs = document.querySelectorAll(".tab");
        const liquid = document.getElementById("liquid");

        function moveLiquid(el) {
            liquid.style.width = el.offsetWidth + "px";
            liquid.style.left = el.offsetLeft + "px";
        }

        tabs.forEach(tab => {
            tab.addEventListener("click", function() {
                tabs.forEach(t => t.classList.remove("active"));
                this.classList.add("active");
                moveLiquid(this);
                
                // Gửi sự kiện filter cho file loadproduct.js nếu nó cần
                if (typeof filterSelection === "function") {
                    filterSelection(this.getAttribute("data-filter"));
                }
            });
        });

        /* 2. PREMIUM TILT EFFECT (Khởi tạo cho các phần tử động) */
        function applyTiltEffect() {
            const cards = document.querySelectorAll('.project');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const dx = x - (rect.width / 2);
                    const dy = y - (rect.height / 2);
                    card.style.transform = `rotateY(${dx / 18}deg) rotateX(${-dy / 18}deg)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                });
            });
        }

        window.addEventListener("load", () => {
            moveLiquid(document.querySelector(".tab.active"));
            // Đợi 1 chút để loadproduct.js render xong ảnh rồi mới apply hiệu ứng
            setTimeout(applyTiltEffect, 600);
        });
    </script>

    <script src="js/loadproduct.js"></script>
</body>
</html>
