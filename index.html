<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <title>NL F.Lab – 3D Artist Portfolio</title>

    <style>
        /* =================================================
        GLOBAL & BASE
        ================================================= */
        body {
            margin: 0; background: #0c0c0c; color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em; line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header { padding: 80px 12% 20px 12%; position: relative; overflow: hidden; }
        header::before {
            content: ""; position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
            width: 800px; height: 800px; background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
            filter: blur(100px); pointer-events: none;
        }

        .brand { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 5px; }
        .logo { width: 100px; height: 100px; object-fit: contain; margin-top: 15px; }
        h1 { font-size: 40px; font-weight: 400; letter-spacing: -0.02em; margin: 0; color: #fff; }
        .subtitle { font-size: 17px; color: #aaa; font-weight: 300; margin: 0; }
        .hero-role { margin-top: 4px; font-size: 11px; color: #555; letter-spacing: 3px; text-transform: uppercase; }

        .hero-divider {
            width: 80px; height: 1px; margin: 25px auto 10px auto;
            background: rgba(255,255,255,0.2);
        }
        .hero-note { text-align: center; font-size: 10px; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-bottom: 25px; }

        .section { padding: 30px 12%; }

        /* =================================================
        APPLE TAB - FIX HIỂN THỊ ACTIVE & GLOW
        ================================================= */
        .filter-container { display: flex; margin-bottom: 40px; }

        .filter {
            display: inline-flex; padding: 4px; position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .filter-btn {
            background: transparent; border: none; color: #666; font-size: 11px;
            cursor: pointer; padding: 10px 24px; border-radius: 40px; 
            transition: color 0.4s ease;
            text-transform: uppercase; letter-spacing: 1.5px; position: relative; z-index: 2;
        }
        
        .filter-btn.active { color: #fff; }

        /* Khối nền của Tab đang chọn - Có viền phát sáng */
        .tab-indicator {
            position: absolute; top: 4px; left: 4px; height: calc(100% - 8px);
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1;
            /* Viền phát sáng nhẹ */
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.05);
            pointer-events: none;
            opacity: 0; /* Mặc định ẩn, sẽ hiện qua JS */
        }

        /* =================================================
        PROJECT GRID - ULTRA SMOOTH REVEAL
        ================================================= */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; 
        }

        .project { 
            position: relative; overflow: hidden; border-radius: 16px; aspect-ratio: 1 / 1; 
            background: #111; opacity: 0; transform: translateY(15px);
            /* Chuyển động mượt mà hơn */
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project.is-visible { opacity: 1; transform: translateY(0); }

        .project img { 
            width: 100%; height: 100%; object-fit: cover; display: block; 
            transition: 1.2s cubic-bezier(0.2, 1, 0.2, 1);
        }

        /* CENTER HOVER EFFECT */
        .project:hover img { transform: scale(1.05); filter: brightness(0.25) blur(4px); }
        .project-title {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            width: 80%; text-align: center; font-size: 13px; font-weight: 400; color: #fff;
            letter-spacing: 2.5px; text-transform: uppercase; opacity: 0;
            transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1); z-index: 2; pointer-events: none;
        }
        .project:hover .project-title { opacity: 1; transform: translate(-50%, -50%); }

        /* =================================================
        ABOUT & OTHERS
        ================================================= */
        .about-intro { color: #aaa; font-size: 15px; text-align: left; max-width: 750px; }
        .fade { opacity: 0; transform: translateY(15px); transition: 0.8s ease-out; }
        .fade.show { opacity: 1; transform: translateY(0); }
        
        footer { padding: 40px 12%; color: #333; font-size: 10px; border-top: 1px solid #1a1a1a; margin-top: 30px; }
    </style>
</head>

<body>
    <header>
        <div class="brand">
            <img src="images/logo.png" class="logo" alt="NL F.Lab">
            <div class="hero-text">
                <h1>NL F.Lab</h1>
                <div class="subtitle">3D Artist</div>
                <div class="hero-role">Product Visualization</div>
            </div>
        </div>
    </header>

    <div class="hero-divider"></div>
    <div class="hero-note">Selected Work</div>

    <section class="section about fade">
        <h2 style="font-size: 19px; font-weight: 500; color: #fff;">About</h2>
        <div class="about-intro">
            I am <strong>Nghia Le</strong>, a Senior 3D Artist with over 7 years of professional experience specializing in <strong>Product Visualization</strong>. 
            With an IT background, I focus on <strong>Workflow Optimization</strong>. Former <strong>Team Leader</strong> at Loft3DI.
        </div>
    </section>

    <section class="section fade">
        <div class="filter-container">
            <div class="filter" id="filterBar">
                <div class="tab-indicator" id="tabIndicator"></div>
                </div>
        </div>
        <div class="grid" id="projectGrid"></div>
    </section>

    <footer>© NL F.Lab – 2026</footer>

    <script>
        // Xử lý Reveal chung
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add("show"); });
        }, { threshold: 0.1 });
        document.querySelectorAll(".fade").forEach(el => observer.observe(el));

        // HÀM ĐIỀU KHIỂN TAB (Sẽ gọi trong loadproduct.js của ông)
        function updateTabIndicator(activeBtn) {
            const indicator = document.getElementById('tabIndicator');
            if (activeBtn && indicator) {
                indicator.style.opacity = "1";
                indicator.style.width = activeBtn.offsetWidth + 'px';
                indicator.style.left = activeBtn.offsetLeft + 'px';
            }
        }

        // Theo dõi Grid để tạo hiệu ứng xuất hiện ảnh tịnh tiến (Stagger)
        const gridObserver = new MutationObserver(() => {
            const projects = document.querySelectorAll('.project');
            projects.forEach((proj, index) => {
                // Xóa class cũ để trigger lại animation nếu đổi tab
                proj.classList.remove('is-visible'); 
                setTimeout(() => {
                    proj.classList.add('is-visible');
                }, index * 80); // Mỗi ảnh cách nhau 80ms, tạo cảm giác lướt rất nhẹ nhàng
            });

            // Cập nhật vị trí indicator khi tab active thay đổi
            const activeTab = document.querySelector('.filter-btn.active');
            if(activeTab) updateTabIndicator(activeTab);
        });

        gridObserver.observe(document.getElementById('projectGrid'), { childList: true });

        // Lắng nghe click để di chuyển indicator ngay lập tức
        document.getElementById('filterBar').addEventListener('click', (e) => {
            if(e.target.classList.contains('filter-btn')) {
                updateTabIndicator(e.target);
            }
        });
    </script>
    <script src="js/loadproduct.js"></script>
</body>
</html>
