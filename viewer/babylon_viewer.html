<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NL-FLab 3D Viewer</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #1e1e1e;
}
babylon {
    width: 100%;
    height: 100%;
}
</style>
</head>

<babylon id="viewer"
model=""
camera-behavior="auto"
environment="https://assets.babylonjs.com/environments/environmentSpecular.env"
engine-antialiasing="true"
hardware-scaling-level="1">
</babylon>

<script>
function getModelFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("model");
}

const modelPath = getModelFromURL();

if (modelPath) {
    document.getElementById("viewer")
        .setAttribute("model", modelPath);
} else {
    alert("No model specified in URL.");
}
</script>

</body>
</html>
