<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NL-FLab 3D Viewer | Diagnostics</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #1e1e1e;
        overflow: hidden;
    }
    babylon {
        width: 100%;
        height: 100%;
    }
    /* Nút bấm để mở bảng tính năng của Babylon */
    #debug-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 15px;
        background: #00bcd4;
        color: #000;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-family: sans-serif;
        font-weight: bold;
        z-index: 1000;
        text-transform: uppercase;
        font-size: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    #debug-btn:hover {
        background: #ffffff;
    }
</style>
</head>
<body>

<button id="debug-btn">Check Materials / Wireframe</button>

<babylon id="viewer"
    model=""
    camera-behavior="auto"
    environment="https://assets.babylonjs.com/environments/environmentSpecular.env"
    engine-antialiasing="true"
    hardware-scaling-level="1">
</babylon>

<script>
function getModelFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("model");
}

const modelPath = getModelFromURL();
const viewerElement = document.getElementById("viewer");

if (modelPath) {
    viewerElement.setAttribute("model", modelPath);
} else {
    alert("No model specified in URL.");
}

// Khi nhấn nút, gọi bảng Debug của Babylon
document.getElementById('debug-btn').onclick = function() {
    // Truy cập vào scene bên trong viewer và hiện Inspector
    const viewerInstance = BabylonViewer.viewerManager.getViewerById("viewer");
    if (viewerInstance && viewerInstance.sceneManager.scene) {
        const scene = viewerInstance.sceneManager.scene;
        
        // Hiện bảng điều khiển có sẵn của Babylon
        if (scene.debugLayer.isVisible()) {
            scene.debugLayer.hide();
        } else {
            scene.debugLayer.show({
                overlay: true,
                handleResize: true,
                enablePopup: false
            });
        }
    }
};
</script>

</body>
</html>
