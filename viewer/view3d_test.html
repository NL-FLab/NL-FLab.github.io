<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NL-FLab 3D Viewer | Official UI</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #1e1e1e;
        overflow: hidden;
    }
    babylon {
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<babylon id="viewer"
    extends="default"
    model=""
    camera-behavior="false"
    engine-antialiasing="true">
</babylon>

<script>
function getModelFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("model");
}

const modelPath = getModelFromURL();
const viewerElement = document.getElementById("viewer");

if (modelPath) {
    viewerElement.setAttribute("model", modelPath);
} else {
    alert("No model specified in URL.");
}

// Lệnh ép camera đứng yên khi load xong
viewerElement.onSceneInitObservable.add((scene) => {
    if (scene.activeCamera) {
        scene.activeCamera.useFramingBehavior = false;
    }
});
</script>

</body>
</html>
