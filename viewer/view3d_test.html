<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NL-FLab 3D Viewer</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
<script src="https://cdn.babylonjs.com/inspector/babylon.inspector.bundle.js"></script>

<style>
html, body {
    width: 100%; height: 100%; margin: 0;
    background: #1e1e1e; overflow: hidden;
}
babylon { width: 100%; height: 100%; }

#debug-btn {
    position: absolute; top: 20px; right: 20px;
    padding: 12px 20px; background: #00bcd4; color: #000;
    border: none; border-radius: 4px; cursor: pointer;
    font-family: sans-serif; font-weight: bold; z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
#debug-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<button id="debug-btn">CHECK MATERIALS / WIREFRAME</button>

<babylon id="viewer"
    model=""
    camera-behavior="auto"
    environment="https://assets.babylonjs.com/environments/environmentSpecular.env"
    engine-antialiasing="true">
</babylon>

<script>
const viewerElement = document.getElementById("viewer");

// Lấy Model từ URL
const params = new URLSearchParams(window.location.search);
const modelPath = params.get("model");
if (modelPath) {
    viewerElement.setAttribute("model", modelPath);
}

document.getElementById('debug-btn').onclick = function() {
    // Truy cập trực tiếp qua Viewer Manager
    const viewerInstance = BabylonViewer.viewerManager.getViewerById("viewer");
    
    if (viewerInstance && viewerInstance.sceneManager && viewerInstance.sceneManager.scene) {
        const scene = viewerInstance.sceneManager.scene;
        
        // Kiểm tra xem Inspector có sẵn chưa và hiển thị
        if (scene.debugLayer) {
            scene.debugLayer.show({
                overlay: true,
                handleResize: true,
                enablePopup: false // Để nó hiện ngay trong cửa sổ web, không mở tab mới
            });
        }
    } else {
        console.error("Viewer chưa sẵn sàng. Hãy đợi model load xong.");
    }
};
</script>

</body>
</html>
