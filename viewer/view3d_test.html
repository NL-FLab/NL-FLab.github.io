<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NL-FLab 3D Viewer</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<style>

html, body{
width:100%;
height:100%;
margin:0;
background:#1e1e1e;
}

babylon{
width:100%;
height:100%;
}

/* UI */

.viewer-ui{

position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
z-index:10;

}

.viewer-ui button{

background:rgba(20,20,20,0.8);
color:white;
border:1px solid #444;
padding:8px 14px;
font-size:13px;
cursor:pointer;
border-radius:4px;

}

.viewer-ui button:hover{

background:#444;

}

.viewer-ui button.active{

background:#aaa;
color:black;

}

</style>
</head>

<body>

<div class="viewer-ui">

<button id="btnRender">Render</button>
<button id="btnWire">Wireframe</button>

</div>

<babylon id="viewer"
model=""
camera-behavior="auto"
environment="https://assets.babylonjs.com/environments/environmentSpecular.env"
engine-antialiasing="true"
hardware-scaling-level="1">
</babylon>

<script>

function getModelFromURL(){

const params=new URLSearchParams(window.location.search);
return params.get("model");

}

const modelPath=getModelFromURL();

const viewerElement=document.getElementById("viewer");

if(modelPath){

viewerElement.setAttribute("model",modelPath);

}else{

alert("No model specified in URL.");

}

let meshes=[];
let originalMaterials=[];

/* Lấy viewer instance */

const viewer=new BabylonViewer.DefaultViewer(viewerElement,{});

/* Khi model load */

viewer.onModelLoadedObservable.add(function(model){

meshes=model.meshes;

meshes.forEach(m=>{

originalMaterials.push(m.material);

});

});

/* UI buttons */

const btnRender=document.getElementById("btnRender");
const btnWire=document.getElementById("btnWire");

function clearActive(){

document.querySelectorAll(".viewer-ui button")
.forEach(b=>b.classList.remove("active"));

}

btnRender.onclick=function(){

clearActive();
btnRender.classList.add("active");

meshes.forEach((m,i)=>{

m.material=originalMaterials[i];

});

};

btnWire.onclick=function(){

clearActive();
btnWire.classList.add("active");

meshes.forEach(m=>{

if(m.material){
m.material.wireframe=true;
}

});

};

</script>

</body>
</html>
