<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NL-FLab 3D Viewer</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<style>

html, body {
    width:100%;
    height:100%;
    margin:0;
    background:#1e1e1e;
}

babylon{
    width:100%;
    height:100%;
}

/* UI overlay */

.viewer-ui{
    position:absolute;
    bottom:20px;
    left:20px;
    display:flex;
    gap:6px;
    z-index:10;
}

.viewer-ui button{

    background:rgba(20,20,20,0.8);
    color:#fff;
    border:1px solid #444;
    padding:6px 12px;
    font-size:13px;
    cursor:pointer;
    border-radius:4px;
}

.viewer-ui button:hover{
    background:#444;
}

.viewer-ui button.active{
    background:#888;
    color:#000;
}

</style>
</head>

<body>

<div class="viewer-ui">
<button onclick="setMode('render')" class="active" id="btnRender">Render</button>
<button onclick="setMode('wire')" id="btnWire">Wireframe</button>
<button onclick="setMode('normal')" id="btnNormal">Normal</button>
</div>

<babylon id="viewer"
model=""
camera-behavior="auto"
environment="https://assets.babylonjs.com/environments/environmentSpecular.env"
engine-antialiasing="true"
hardware-scaling-level="1">
</babylon>

<script>

function getModelFromURL(){
    const params=new URLSearchParams(window.location.search);
    return params.get("model");
}

const viewer=document.getElementById("viewer");

const modelPath=getModelFromURL();

if(modelPath){
    viewer.setAttribute("model",modelPath);
}else{
    alert("No model specified in URL.");
}

let scene;
let meshes=[];

viewer.onSceneInitObservable.add(function(sceneObj){

    scene=sceneObj;

});

viewer.onModelLoadedObservable.add(function(model){

    meshes=model.meshes;

});

function clearButtons(){

    document.querySelectorAll(".viewer-ui button")
    .forEach(b=>b.classList.remove("active"));

}

function setMode(mode){

    clearButtons();

    if(mode==="render"){

        document.getElementById("btnRender").classList.add("active");

        meshes.forEach(m=>{
            if(m.material){
                m.material.wireframe=false;
            }
        });

    }

    if(mode==="wire"){

        document.getElementById("btnWire").classList.add("active");

        meshes.forEach(m=>{
            if(m.material){
                m.material.wireframe=true;
            }
        });

    }

    if(mode==="normal"){

        document.getElementById("btnNormal").classList.add("active");

        meshes.forEach(m=>{

            if(m.material){

                const mat=new BABYLON.StandardMaterial("normalView",scene);

                if(m.material.bumpTexture){
                    mat.diffuseTexture=m.material.bumpTexture;
                }

                m.material=mat;

            }

        });

    }

}

</script>

</body>
</html>
